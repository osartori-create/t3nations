<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N Master v28 - RECOVERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .tab-btn { color: white; opacity: 0.7; transition: all 0.2s; cursor: pointer; }
        .tab-btn.active-tab { opacity: 1; background: #f59e0b; color: #000; }
        .active-u8 { background: #2563eb !important; color: white !important; }
        .active-u10 { background: #ffffff !important; color: #0f172a !important; }
        .active-u12 { background: #dc2626 !important; color: white !important; }
        .excel-table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #cbd5e1; padding: 6px 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen" onload="initApp()">

<header class="bg-slate-900 text-white p-4 flex justify-between items-center border-b-4 border-amber-500 sticky top-0 z-50">
    <div class="flex items-center gap-6">
        <h1 class="text-2xl font-black italic uppercase">T3N MASTER</h1>
        <input type="number" id="config-year" value="2026" class="bg-transparent text-slate-400 w-16">
        <nav class="flex gap-1 bg-white/5 p-1 rounded-xl">
            <button onclick="showTab('IMPORT')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] active-tab" id="tab-IMPORT">Import</button>
            <button onclick="showTab('U6')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U6">U6</button>
            <button onclick="showTab('U8')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U8">U8</button>
            <button onclick="showTab('U10')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U10">U10</button>
            <button onclick="showTab('U12')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U12">U12</button>
            <button onclick="showTab('TROPHEE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] ml-4 text-amber-300" id="tab-TROPHEE">🏆 Trophée</button>
            <button onclick="showTab('MAINTENANCE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] ml-1 text-red-400" id="tab-MAINTENANCE">Purges</button>
        </nav>
    </div>
    <div id="sync-status" class="text-[9px] text-green-400 font-black hidden">● Live</div>
</header>

<main class="p-6 max-w-[1900px] mx-auto">
    <section id="content-IMPORT" class="tab-content">
        <div class="bg-white p-8 rounded-3xl shadow-sm">
            <h2 class="text-xl font-black uppercase mb-4">1. Importation Clubs</h2>
            <textarea id="csv-input" rows="6" class="w-full bg-slate-50 border p-4 text-xs" placeholder="Nom Club | U6 | U8 | U10 | U12"></textarea>
            <button onclick="processMasterImport()" class="w-full mt-4 bg-slate-900 text-white p-4 rounded-xl font-black uppercase">Valider</button>
        </div>
        <div id="master-table-container" class="mt-6 bg-white p-6 rounded-3xl hidden">
            <table class="w-full text-left text-sm"><tbody id="master-tbody"></tbody></table>
        </div>
    </section>

    <section id="content-CAT" class="tab-content hidden">
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <h2 class="text-4xl font-black uppercase" id="active-cat-title">...</h2>
                    <div id="reserve-zone" class="mt-4 bg-slate-50 border-2 border-dashed p-4 min-h-[150px] rounded-xl"></div>
                </div>
            </div>
            <div class="col-span-9">
                <div id="match-board" class="bg-white p-6 rounded-3xl shadow-sm min-h-[400px]">
                    <p class="text-slate-400 italic">Sélectionnez un format ou importez des données.</p>
                </div>
            </div>
        </div>
    </section>

    <section id="content-MAINTENANCE" class="tab-content hidden">
        <div class="bg-white p-8 rounded-3xl max-w-xl mx-auto border-2 border-red-100">
            <h2 class="text-2xl font-black text-red-600 mb-6 uppercase">Maintenance</h2>
            <button onclick="purge('ALL')" class="w-full py-4 bg-red-600 text-white rounded-xl font-black uppercase shadow-lg">Purger toute la mémoire (Reset complet)</button>
            <p class="text-[10px] text-slate-400 mt-4 text-center">Utilisez ce bouton si l'interface se bloque.</p>
        </div>
    </section>
    
    <section id="content-TROPHEE" class="tab-content hidden">
        <div class="bg-white p-8 rounded-3xl text-center">
            <h2 class="text-2xl font-black uppercase">🏆 Trophée T3N</h2>
            <div id="trophy-list" class="mt-6 italic text-slate-400">En attente de calcul...</div>
        </div>
    </section>
</main>

<script>
    // --- CONFIGURATION FIREBASE ---
    const firebaseConfig = { 
        apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI", 
        authDomain: "t3nations.firebaseapp.com", 
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "t3nations" 
    };

    if (!firebase.apps.length && firebaseConfig.apiKey !== "VOTRE_API_KEY") {
        firebase.initializeApp(firebaseConfig);
    }
    const db = (firebase.apps.length) ? firebase.database() : null;

    // --- ETAT DE L'APPLICATION ---
    let appState = { 
        masterData: [], 
        activeCat: 'U10', 
        currentPhase: 'PHASE1', 
        cats: { 'U6': { phase1: { teams: [], poules: [], reserve: [] } }, 'U8': { phase1: { teams: [], poules: [], reserve: [] } }, 'U10': { phase1: { teams: [], poules: [], reserve: [] } }, 'U12': { phase1: { teams: [], poules: [], reserve: [] } } } 
    };

    function initApp() {
        const saved = localStorage.getItem('t3n_recovery_v28');
        if (saved) {
            try { appState = JSON.parse(saved); } catch(e) { console.error("Cache corrompu"); }
        }
        if(db) document.getElementById('sync-status').classList.remove('hidden');
        showTab('IMPORT');
    }

    function saveState() {
        localStorage.setItem('t3n_recovery_v28', JSON.stringify(appState));
    }

    function showTab(id) {
        // Masquer tout
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab', 'active-u8', 'active-u10', 'active-u12'));
        
        // Activer bouton
        const btn = document.getElementById('tab-' + id);
        if(btn) {
            btn.classList.add('active-tab');
            if(id === 'U8') btn.classList.add('active-u8');
            if(id === 'U10') btn.classList.add('active-u10');
            if(id === 'U12') btn.classList.add('active-u12');
        }

        // Afficher contenu
        if(['IMPORT', 'MAINTENANCE', 'TROPHEE'].includes(id)) {
            document.getElementById('content-' + id).classList.remove('hidden');
        } else {
            appState.activeCat = id;
            document.getElementById('content-CAT').classList.remove('hidden');
            document.getElementById('active-cat-title').innerText = id;
            renderReserve();
        }
    }

    function processMasterImport() {
        const raw = document.getElementById('csv-input').value;
        const lines = raw.split('\n').filter(l => l.trim());
        appState.masterData = lines.map((l, i) => ({ name: l.split(/\t|,/)[0], u8: 1, u10: 1, u12: 1 }));
        alert("Importation réussie (" + appState.masterData.length + " clubs)");
        saveState();
    }

    function renderReserve() {
        const zone = document.getElementById('reserve-zone');
        if(zone) zone.innerHTML = "<p class='text-xs text-slate-400'>Réserve vide.</p>";
    }

    function purge(type) {
        if(type === 'ALL') {
            if(confirm("Voulez-vous vider toute la mémoire ?")) {
                localStorage.clear();
                location.reload();
            }
        }
    }

    function broadcastSettings() { console.log("Broadcast..."); }
</script>
</body>
</html>
