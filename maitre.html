<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N Master Orchestrator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .drag-over { border: 3px dashed #f59e0b !important; background: #fffbeb; }
        .conflict-alert { animation: shake 0.5s; border: 2px solid #ef4444 !important; background: #fef2f2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <header class="bg-slate-900 text-white p-6 shadow-2xl flex justify-between items-center border-b-4 border-amber-500 sticky top-0 z-50">
        <div class="flex items-center gap-8">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">T3N <span class="text-amber-500">Master</span></h1>
            <nav class="flex gap-2 bg-white/10 p-1 rounded-xl">
                <button onclick="switchCat('U6')" class="cat-btn px-4 py-2 rounded-lg font-black text-xs uppercase" id="btn-U6">U6</button>
                <button onclick="switchCat('U8')" class="cat-btn px-4 py-2 rounded-lg font-black text-xs uppercase" id="btn-U8">U8</button>
                <button onclick="switchCat('U10')" class="cat-btn px-4 py-2 rounded-lg font-black text-xs uppercase bg-amber-500 text-black" id="btn-U10">U10</button>
                <button onclick="switchCat('U12')" class="cat-btn px-4 py-2 rounded-lg font-black text-xs uppercase" id="btn-U12">U12</button>
            </nav>
        </div>
        <button onclick="deploy()" class="bg-amber-500 hover:bg-amber-600 px-8 py-3 rounded-2xl text-slate-950 font-black uppercase shadow-xl transition-all active:scale-95">Déployer aux Terrains</button>
    </header>

    <main class="p-8 max-w-[1800px] mx-auto grid grid-cols-1 xl:grid-cols-12 gap-8">
        
        <section class="xl:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                <h2 class="text-xl font-black uppercase mb-4 flex items-center gap-3">
                    <span class="bg-slate-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm italic">1</span>
                    Import Catégorie <span id="label-cat" class="text-amber-600">U10</span>
                </h2>
                <textarea id="input-csv" rows="6" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-xs font-mono focus:border-amber-500 outline-none" placeholder="Coller ici les lignes de ton Excel..."></textarea>
                <button onclick="processInput()" class="w-full mt-4 bg-slate-900 text-white p-4 rounded-xl font-black uppercase">Analyser Equipes</button>
            </div>

            <div id="panel-format" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 hidden">
                <h2 class="text-xl font-black uppercase mb-4 flex items-center gap-3">
                    <span class="bg-slate-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm italic">2</span>
                    Choix du Format
                </h2>
                <div id="format-list" class="space-y-2">
                    </div>
            </div>
        </section>

        <section class="xl:col-span-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="board">
            <div class="col-span-full py-40 flex flex-col items-center justify-center opacity-20 border-4 border-dashed border-slate-300 rounded-[3rem]">
                <h2 class="text-2xl font-black uppercase italic">En attente de configuration</h2>
            </div>
        </section>
    </main>

    <script>
        let currentCat = "U10";
        let teams = [];
        let poules = [];

        function switchCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-amber-500', 'text-black'));
            document.getElementById(`btn-${cat}`).classList.add('bg-amber-500', 'text-black');
            document.getElementById('label-cat').innerText = cat;
        }

        function processInput() {
            const raw = document.getElementById('input-csv').value;
            const lines = raw.split('\n').filter(l => l.trim());
            teams = [];

            lines.forEach(line => {
                // Regex améliorée pour séparer noms et chiffres collés
                const parts = line.match(/([A-Za-z\s.\-]+)|(\d+)/g);
                if(parts && parts.length >= 5) {
                    const name = parts[0].trim();
                    const u6 = parseInt(parts[1]);
                    const u8 = parseInt(parts[2]);
                    const u10 = parseInt(parts[3]);
                    const u12 = parseInt(parts[4]);
                    
                    const count = currentCat === 'U6' ? u6 : currentCat === 'U8' ? u8 : currentCat === 'U10' ? u10 : u12;
                    
                    for(let i=1; i<=count; i++) {
                        teams.push({ 
                            id: `${name}_${i}`, 
                            club: name, 
                            level: i, 
                            name: `${name} ${i}`,
                            isForeign: name.toLowerCase().includes('zug') || name.toLowerCase().includes('frankfurt') || name.toLowerCase().includes('heidelberg')
                        });
                    }
                }
            });

            if(teams.length > 0) calculateFormats();
        }

        function calculateFormats() {
            const total = teams.length;
            const formats = [];
            const panel = document.getElementById('panel-format');
            const list = document.getElementById('format-list');
            panel.classList.remove('hidden');
            list.innerHTML = "";

            // Algo simple de recherche de combinaisons (poules de 3,4,5,6)
            for(let p5=0; p5<=total/5; p5++) {
                for(let p4=0; p4<=total/4; p4++) {
                    if(p5*5 + p4*4 === total) {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-4 rounded-xl border-2 font-bold text-left hover:scale-[1.02] transition-all bg-green-50 border-green-200 text-green-800";
                        btn.innerText = `${p5} poule(s) de 5 + ${p4} poule(s) de 4`;
                        btn.onclick = () => ventiler([p5, p4]);
                        list.appendChild(btn);
                    }
                }
            }
        }

        function ventiler([nb5, nb4]) {
            poules = [];
            let terrainCount = 1;
            for(let i=0; i<nb5; i++) poules.push({ id: poules.length, terrain: terrainCount++, teams: [], target: 5 });
            for(let i=0; i<nb4; i++) poules.push({ id: poules.length, terrain: terrainCount++, teams: [], target: 4 });

            // Tri pour ventilation intelligente
            const sorted = [...teams].sort((a,b) => (a.level - b.level) || (b.isForeign - a.isForeign));

            sorted.forEach(t => {
                const bestPoule = poules
                    .filter(p => p.teams.length < p.target)
                    .sort((a,b) => (a.teams.filter(x => x.club === t.club).length - b.teams.filter(x => x.club === t.club).length) || (a.teams.length - b.teams.length))[0];
                if(bestPoule) bestPoule.teams.push(t);
            });

            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = poules.map((p, pIdx) => {
                const clubs = p.teams.map(t => t.club);
                const hasConflict = clubs.some((c, i) => clubs.indexOf(c) !== i);

                return `
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 ${hasConflict ? 'conflict-alert' : 'border-slate-200'}" 
                         ondragover="event.preventDefault()" ondrop="drop(event, ${pIdx})">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black italic uppercase">Poule ${String.fromCharCode(65+pIdx)}</h3>
                            <span class="text-xs font-bold bg-slate-100 px-2 py-1 rounded">Terrain ${p.terrain}</span>
                        </div>
                        <div class="space-y-2 min-h-[100px]">
                            ${p.teams.map((t, tIdx) => `
                                <div draggable="true" ondragstart="drag(event, ${pIdx}, ${tIdx})"
                                     class="p-3 bg-slate-50 rounded-xl border border-slate-100 text-sm font-bold flex justify-between items-center cursor-move">
                                    ${t.name}
                                    ${t.isForeign ? '🌍' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Drag & Drop
        let dragged = null;
        function drag(e, pIdx, tIdx) { dragged = { pIdx, tIdx }; }
        function drop(e, targetIdx) {
            const team = poules[dragged.pIdx].teams.splice(dragged.tIdx, 1)[0];
            poules[targetIdx].teams.push(team);
            renderBoard();
        }

        function deploy() {
            // Ici la fonction db.ref().update(...) vue précédemment
            alert("Déploiement en cours pour " + currentCat);
        }
    </script>
</body>
</html>
