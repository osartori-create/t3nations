<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3N MASTER - Centre de Commandement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .drag-ghost { opacity: 0.4; background: #fef3c7; }
        .drop-target { border-top: 4px solid #f59e0b; }
        .bg-u8 { background-color: #2563eb; } .bg-u10 { background-color: #f8fafc; color: #0f172a; } .bg-u12 { background-color: #dc2626; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans overflow-hidden h-screen flex flex-col">

    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase"><span class="text-amber-500">T3N</span> MASTER</h1>
            <select id="sel-cat" onchange="switchContext()" class="bg-slate-700 p-2 rounded font-bold uppercase border-none focus:ring-2 focus:ring-amber-500">
                <option value="U8" class="text-blue-400">U8 (Bleu)</option>
                <option value="U10" class="text-slate-400">U10 (Blanc)</option>
                <option value="U12" class="text-red-400">U12 (Rouge)</option>
            </select>
            <select id="sel-phase" onchange="switchContext()" class="bg-slate-700 p-2 rounded font-bold border-none">
                <option value="matin">Phase 1 (Matin)</option>
                <option value="apresmidi">Phase 2 (Après-midi)</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-import').classList.toggle('hidden')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-black uppercase text-xs">Importer JSON Assistant</button>
            <button onclick="calculateGlobalRanking()" class="bg-amber-500 hover:bg-amber-600 px-4 py-2 rounded font-black uppercase text-xs text-slate-900">Calculer Classement</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <section class="w-2/3 border-r border-slate-700 flex flex-col overflow-hidden">
            <div class="p-4 bg-slate-800/50 flex justify-between items-center">
                <h2 class="font-black uppercase tracking-widest text-slate-400">Moniteur des Scores Live</h2>
                <div id="sync-status" class="text-[10px] uppercase px-2 py-1 rounded bg-green-900/50 text-green-400 font-bold border border-green-700">Connecté</div>
            </div>
            <div id="matches-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 content-start">
                </div>
        </section>

        <section class="w-1/3 flex flex-col bg-slate-800/30 overflow-hidden">
            <div class="p-4 flex justify-between items-center border-b border-slate-700">
                <h2 class="font-black uppercase tracking-widest text-slate-400">Classement Global</h2>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-[10px] font-black uppercase">Copier vers Excel</button>
            </div>
            
            <div id="ranking-container" class="flex-1 overflow-y-auto p-2">
                <table class="w-full text-xs">
                    <thead class="sticky top-0 bg-slate-900 text-slate-500 uppercase font-black text-[10px]">
                        <tr>
                            <th class="p-2 text-left">Rang</th>
                            <th class="p-2 text-left">Equipe</th>
                            <th class="p-2 text-center">Pts</th>
                            <th class="p-2 text-center">GA</th>
                            <th class="p-2">Obs.</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-import" class="hidden fixed inset-0 bg-slate-950/90 flex items-center justify-center p-6 z-50">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-2xl border border-slate-700 shadow-2xl">
            <h3 class="text-xl font-black mb-4 uppercase italic">Importer la configuration Gem</h3>
            <p class="text-slate-400 text-xs mb-4">Collez ici le bloc de code JSON fourni par votre assistant.</p>
            <textarea id="import-area" class="w-full h-64 bg-slate-900 border border-slate-700 rounded p-3 text-mono text-xs text-blue-400 focus:outline-none focus:ring-1 focus:ring-amber-500" placeholder='[{"poule": "A", "terrains": [1], "equipes": [...]}, ...]'></textarea>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="document.getElementById('modal-import').classList.add('hidden')" class="px-6 py-2 text-slate-400 font-bold uppercase text-xs">Annuler</button>
                <button onclick="processImport()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-black uppercase text-sm">Lancer le déploiement</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI",
            authDomain: "t3nations.firebaseapp.com",
            databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "t3nations",
            storageBucket: "t3nations.firebasestorage.app",
            messagingSenderId: "368081588642",
            appId: "1:368081588642:web:c1f2c6a3c2c9b47929a2fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentData = { matches: {}, poules: [] };
        let globalRanking = [];
        const MATRICES = {
            3: [{a:1,b:2,arb:3},{a:2,b:3,arb:1},{a:1,b:3,arb:2}],
            4: [{a:1,b:2,arb:4},{a:3,b:4,arb:1},{a:1,b:3,arb:2},{a:2,b:4,arb:3},{a:1,b:4,arb:2},{a:2,b:3,arb:1}],
            5: [{a:1,b:3,arb:5},{a:2,b:4,arb:3},{a:1,b:5,arb:2},{a:3,b:4,arb:1},{a:2,b:5,arb:4},{a:1,b:2,arb:4},{a:3,b:5,arb:2},{a:1,b:4,arb:5},{a:2,b:3,arb:1},{a:4,b:5,arb:3}],
            6: [{a:1,b:3,arb:2},{a:5,b:6,arb:4},{a:2,b:4,arb:1},{a:3,b:6,arb:5},{a:1,b:5,arb:6},{a:3,b:4,arb:2},{a:1,b:6,arb:3},{a:2,b:5,arb:4},{a:1,b:2,arb:5},{a:4,b:6,arb:3},{a:3,b:5,arb:1},{a:2,b:6,arb:4},{a:1,b:4,arb:5},{a:2,b:3,arb:6},{a:4,b:5,arb:3}]
        };

        // --- CORE LOGIC ---

        function switchContext() {
            const cat = document.getElementById('sel-cat').value;
            const phase = document.getElementById('sel-phase').value;
            const year = new Date().getFullYear();
            
            db.ref(`t3n/${year}/${cat}_${phase}`).on('value', snapshot => {
                currentData = snapshot.val() || { matches: {}, poules: [] };
                renderLiveFeed();
                calculateGlobalRanking();
            });
        }

        function renderLiveFeed() {
            const container = document.getElementById('matches-grid');
            container.innerHTML = '';
            
            const sortedMatches = Object.entries(currentData.matches || {}).sort((a,b) => a[1].poule.localeCompare(b[1].poule));
            
            sortedMatches.forEach(([id, m]) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border flex items-center justify-between ${m.s1 || m.s2 ? 'bg-slate-800 border-slate-600' : 'bg-slate-800/20 border-slate-700/50 opacity-60'}`;
                div.innerHTML = `
                    <div class="flex flex-col gap-1 w-full">
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-500 uppercase">
                            <span>Poule ${m.poule} - Terrain ${m.terrain}</span>
                            <span class="${m.status === 'termine' ? 'text-green-500' : 'text-amber-500'}">${m.status || 'En attente'}</span>
                        </div>
                        <div class="flex justify-between items-center text-xs font-bold">
                            <span class="truncate w-24 uppercase">${m.t1}</span>
                            <span class="bg-slate-900 px-3 py-1 rounded-md text-amber-500 font-black text-lg">${m.s1 || 0} - ${m.s2 || 0}</span>
                            <span class="truncate w-24 text-right uppercase">${m.t2}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function calculateGlobalRanking() {
            const teams = {};
            const matches = Object.values(currentData.matches || {});
            
            matches.forEach(m => {
                [m.t1, m.t2].forEach(t => { if(!teams[t]) teams[t] = { name: t, pts: 0, pour: 0, contre: 0, diff: 0, matches: 0, poule: m.poule } });
                
                if(m.s1 !== undefined && m.s2 !== undefined) {
                    teams[m.t1].matches++; teams[m.t2].matches++;
                    teams[m.t1].pour += m.s1; teams[m.t1].contre += m.s2;
                    teams[m.t2].pour += m.s2; teams[m.t2].contre += m.s1;
                    
                    if(m.s1 > m.s2) { teams[m.t1].pts += 3; teams[m.t2].pts += 1; }
                    else if(m.s1 < m.s2) { teams[m.t1].pts += 1; teams[m.t2].pts += 3; }
                    else { teams[m.t1].pts += 2; teams[m.t2].pts += 2; }
                }
            });

            Object.values(teams).forEach(t => t.diff = t.pour - t.contre);

            // Tri initial : Points > Diff > Essais Pour
            globalRanking = Object.values(teams).sort((a,b) => (b.pts - a.pts) || (b.diff - a.diff) || (b.pour - a.pour));
            renderRanking();
        }

        function renderRanking() {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '';
            
            globalRanking.forEach((t, i) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-700/50 hover:bg-slate-700/30 cursor-move";
                tr.draggable = true;
                tr.dataset.index = i;
                
                // Events Drag & Drop
                tr.ondragstart = e => { e.target.classList.add('drag-ghost'); e.dataTransfer.setData('text/plain', i); };
                tr.ondragend = e => e.target.classList.remove('drag-ghost');
                tr.ondragover = e => { e.preventDefault(); tr.classList.add('drop-target'); };
                tr.ondragleave = e => tr.classList.remove('drop-target');
                tr.ondrop = e => { e.preventDefault(); tr.classList.remove('drop-target'); handleDrop(e.dataTransfer.getData('text/plain'), i); };

                tr.innerHTML = `
                    <td class="p-2 font-black text-slate-500">${i+1}${i===0?'er':'e'}</td>
                    <td class="p-2 font-bold uppercase truncate max-w-[120px]">${t.name}</td>
                    <td class="p-2 text-center font-black text-blue-400">${t.pts}</td>
                    <td class="p-2 text-center text-slate-400">${t.diff > 0 ? '+'+t.diff : t.diff}</td>
                    <td class="p-1"><input type="text" placeholder="..." class="bg-transparent border-none text-[9px] w-full focus:ring-0 text-slate-500"></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function handleDrop(from, to) {
            const moved = globalRanking.splice(from, 1)[0];
            globalRanking.splice(to, 0, moved);
            renderRanking();
        }

        // --- IMPORT & EXPORT ---

        function processImport() {
            const raw = document.getElementById('import-area').value;
            try {
                const poules = JSON.parse(raw);
                const year = new Date().getFullYear();
                const cat = document.getElementById('sel-cat').value;
                const phase = document.getElementById('sel-phase').value;
                
                let updates = { poules: poules, matches: {} };

                poules.forEach(p => {
                    const nb = p.equipes.length;
                    const matrix = MATRICES[nb];
                    if(!matrix) return alert(`Format de poule de ${nb} non géré.`);
                    
                    matrix.forEach((match, idx) => {
                        const mid = `${p.poule}_M${idx+1}`;
                        updates.matches[mid] = {
                            poule: p.poule,
                            terrain: p.terrains[idx % p.terrains.length],
                            t1: p.equipes[match.a - 1],
                            t2: p.equipes[match.b - 1],
                            arb: p.equipes[match.arb - 1],
                            s1: 0, s2: 0, status: 'en_attente'
                        };
                    });
                });

                db.ref(`t3n/${year}/${cat}_${phase}`).set(updates)
                  .then(() => { alert("🚀 Tournoi déployé !"); document.getElementById('modal-import').classList.add('hidden'); });
            } catch(e) { alert("Erreur de format JSON."); }
        }

        function exportToExcel() {
            let tsv = "Rang\tEquipe\tPoints\tDiff\tPour\tObs\n";
            globalRanking.forEach((t, i) => {
                tsv += `${i+1}\t${t.name}\t${t.pts}\t${t.diff}\t${t.pour}\t\n`;
            });
            navigator.clipboard.writeText(tsv).then(() => alert("Copié ! Collez directement dans Excel."));
        }

        window.onload = switchContext;
    </script>
</body>
</html>
