<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N Master v47 - Intégral Pro</title>
    <script>
        window.onerror = function(m, s, l) { alert("🛑 ERREUR : " + m + "\nLigne : " + l); return false; };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-color: #f59e0b; }
        .tab-btn { color: white; opacity: 0.7; transition: all 0.2s; cursor: pointer; }
        .tab-btn.active-tab { opacity: 1; background-color: var(--primary-color); color: #000; font-weight: 900; }
        .active-poule-tab { background: #1e293b !important; color: #fff !important; }
        .scenario-card { transition: all 0.2s; cursor: pointer; border: 2px solid #e2e8f0; }
        .scenario-active { border-color: var(--primary-color) !important; background-color: #fffbeb !important; }
        .forfait { opacity: 0.35; filter: grayscale(1); text-decoration: line-through; }
        .sas-overlay { backdrop-filter: blur(10px); background: rgba(15, 23, 42, 0.9); }
        .excel-table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #cbd5e1; padding: 6px 4px; }
        .excel-header { background-color: #f1f5f9; font-weight: 900; text-transform: uppercase; font-size: 10px;}
        .excel-yellow { background-color: #fef08a; font-weight: 900; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen" onload="initApp()">

<div id="sas-entree" class="fixed inset-0 z-[100] sas-overlay flex items-center justify-center p-4 no-print">
    <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border-4" style="border-color: var(--primary-color);">
        <h2 class="text-3xl font-black uppercase italic mb-4 text-center">T3N <span style="color: var(--primary-color);">MASTER</span></h2>
        <div class="space-y-4">
            <input type="text" id="sas-id" class="w-full bg-slate-100 p-4 rounded-2xl font-black uppercase outline-none" placeholder="ID DU TOURNOI">
            <input type="number" id="sas-pin" class="w-full bg-slate-100 p-4 rounded-2xl font-black text-2xl tracking-[1rem] text-center outline-none" placeholder="0000">
            <button onclick="validerSas()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase">Démarrer</button>
        </div>
    </div>
</div>

<div id="qr-modal" class="fixed inset-0 z-[110] sas-overlay hidden flex-col items-center justify-center p-4 no-print">
    <div class="bg-white rounded-[2rem] p-6 max-w-5xl w-full shadow-2xl flex flex-col max-h-[95vh]">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-2xl font-black uppercase italic">📱 Partage Terrains</h2>
            <button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="bg-slate-200 px-4 py-2 rounded-lg font-black uppercase text-xs">Fermer</button>
        </div>
        <div class="mb-4 bg-slate-50 p-4 rounded-xl border">
            <label class="text-[10px] font-black uppercase text-slate-500">Lien GitHub Pages</label>
            <input type="text" id="cfg-base-url" onchange="appState.branding.baseUrl = this.value; saveState(); renderQRCodes();" class="w-full bg-white border p-2 mt-1 rounded-lg font-bold text-sm outline-none" placeholder="https://votre-nom.github.io/t3nations">
        </div>
        <div class="overflow-y-auto flex-1 space-y-6" id="qr-terrains-list"></div>
    </div>
</div>

<header class="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 sticky top-0 z-50 no-print" id="main-header" style="border-bottom-color: var(--primary-color);">
    <div class="flex items-center gap-6">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter" id="header-title">MASTER</h1>
        <nav class="flex gap-1 bg-white/5 p-1 rounded-xl">
            <button onclick="showTab('IMPORT')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase active-tab" id="tab-IMPORT">Import</button>
            <button onclick="showTab('U6')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U6">U6</button>
            <button onclick="showTab('U8')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U8">U8</button>
            <button onclick="showTab('U10')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U10">U10</button>
            <button onclick="showTab('U12')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U12">U12</button>
            <button onclick="showTab('TROPHEE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase ml-4 text-amber-300 border border-amber-500/30" id="tab-TROPHEE">🏆 Trophée</button>
            <button onclick="openQRModal()" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase ml-2 text-white bg-indigo-600">📱 QR</button>
        </nav>
    </div>
    <div id="save-indicator" class="text-[10px] text-slate-400 font-bold italic opacity-0 transition-opacity">💾 Sauvegardé</div>
</header>

<main class="p-6 max-w-[1900px] mx-auto no-print">
    <section id="content-IMPORT" class="tab-content space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-black uppercase italic">Configuration & Clubs</h2>
            <div class="flex gap-2">
                <button onclick="exportClubsCSV()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">📥 Export Clubs</button>
                <button onclick="exportJSON()" class="bg-slate-700 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">💾 Sauvegarde JSON</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-[10px] font-black uppercase text-slate-400">Nom du Tournoi</label><input type="text" id="cfg-tournoi-name" onchange="updateBranding()" class="w-full bg-slate-50 p-2 rounded-xl font-bold mt-1 outline-none border"></div>
                    <div class="w-1/4"><label class="text-[10px] font-black uppercase text-slate-400">Couleur</label><input type="color" id="cfg-theme-color" onchange="updateBranding()" class="w-full h-10 rounded-xl cursor-pointer mt-1"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="border-2 border-dashed p-2 rounded-xl text-center"><p class="text-[8px] font-black uppercase">Logo Club</p><input type="file" onchange="handleImage(this, 'logoClub')" class="hidden" id="logo1"><button onclick="document.getElementById('logo1').click()" class="text-[10px] bg-slate-100 px-2 py-1 rounded mt-1">Choisir</button></div>
                    <div class="border-2 border-dashed p-2 rounded-xl text-center"><p class="text-[8px] font-black uppercase">Logo Année</p><input type="file" onchange="handleImage(this, 'logoYear')" class="hidden" id="logo2"><button onclick="document.getElementById('logo2').click()" class="text-[10px] bg-slate-100 px-2 py-1 rounded mt-1">Choisir</button></div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <textarea id="csv-input" rows="4" class="w-full bg-slate-50 border-2 rounded-xl p-3 font-mono text-xs outline-none" placeholder="Coller colonnes : Club | U6 | U8 | U10 | U12"></textarea>
                <button onclick="processMasterImport()" class="w-full mt-2 bg-slate-900 text-white py-3 rounded-xl font-black uppercase">Importer les Équipes</button>
            </div>
        </div>
        <div id="master-table-container" class="bg-white p-6 rounded-[2rem] border hidden">
            <table class="w-full text-left text-sm"><thead id="master-thead" class="bg-slate-50 text-[10px] font-black uppercase"></thead><tbody id="master-tbody" class="divide-y italic"></tbody></table>
        </div>
    </section>

    <section id="content-CAT" class="tab-content hidden space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
            <div class="flex items-center gap-4">
                <h2 class="text-3xl font-black uppercase" id="active-cat-title">...</h2>
                <nav class="flex gap-1 bg-slate-100 p-1 rounded-xl font-black text-[10px]">
                    <button onclick="switchCatPhase('PHASE1')" id="tab-phase1" class="px-3 py-1.5 uppercase rounded-lg active-tab">Brassage</button>
                    <button onclick="switchCatPhase('PHASE2')" id="tab-phase2" class="px-3 py-1.5 uppercase rounded-lg bg-white">Classement</button>
                </nav>
            </div>
            <div class="flex gap-2">
                <button onclick="exportCategoryExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md">📥 Excel</button>
                <button onclick="imprimerPouleActive()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md">🖨️ Imprimer Poule</button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-3 space-y-4">
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                    <div id="architect-panel">
                        <h3 class="text-xs font-black uppercase text-indigo-600 mb-4">📐 Architecte Horaire</h3>
                        <div class="grid grid-cols-3 gap-1 mb-4 text-center">
                            <div class="bg-slate-50 p-1 rounded"><p class="text-[7px] uppercase">Matin</p><input type="number" id="cfg-p1" onchange="updateSettings()" class="w-full text-center text-xs font-black" value="120"></div>
                            <div class="bg-slate-50 p-1 rounded"><p class="text-[7px] uppercase">AM</p><input type="number" id="cfg-p2" onchange="updateSettings()" class="w-full text-center text-xs font-black" value="120"></div>
                            <div class="bg-slate-50 p-1 rounded"><p class="text-[7px] uppercase">Batt.</p><input type="number" id="cfg-bt" onchange="updateSettings()" class="w-full text-center text-xs font-black" value="2"></div>
                        </div>
                        <div id="scenario-list" class="space-y-2 max-h-[30vh] overflow-y-auto pr-1"></div>
                    </div>
                    <div id="phase2-panel" class="hidden">
                        <button onclick="generatePhase2()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Calculer Péréquation</button>
                    </div>
                    <hr class="my-4">
                    <div class="flex justify-between items-center mb-2"><p class="text-[10px] font-black uppercase opacity-40">Réserve</p><span id="reserve-count" class="bg-slate-200 px-2 rounded-full text-[10px]">0</span></div>
                    <div id="reserve-zone" ondragover="allowDrop(event)" ondrop="dropToReserve(event)" class="bg-slate-50 border-2 border-dashed rounded-xl p-3 min-h-[100px] flex flex-col gap-1"></div>
                </div>
            </div>
            <div class="xl:col-span-9 space-y-4">
                <div id="validation-zone" class="hidden bg-amber-100 p-4 rounded-[2rem] flex justify-between items-center border border-amber-300">
                    <p class="font-black text-amber-800 uppercase text-xs">Ajustez les équipes par glisser-déposer.</p>
                    <button onclick="validateFormat()" class="bg-amber-500 text-black px-6 py-2 rounded-xl font-black uppercase">Valider</button>
                </div>
                <div id="poule-tabs" class="flex gap-1 overflow-x-auto bg-slate-200 p-1 rounded-xl"></div>
                <div id="match-board"></div>
                <div id="deploy-zone" class="hidden bg-slate-900 text-white p-5 rounded-[2rem] flex justify-between items-center mt-4">
                    <p class="text-amber-500 font-black uppercase text-sm italic">Diffuser au Live</p>
                    <button onclick="deployCategory()" class="bg-amber-500 text-black px-8 py-3 rounded-xl font-black uppercase shadow-xl">Envoyer aux Terrains</button>
                </div>
            </div>
        </div>
    </section>

    <section id="content-TROPHEE" class="tab-content hidden space-y-6">
        <div class="bg-white p-8 rounded-[2rem] border-2 border-amber-200 shadow-xl max-w-5xl mx-auto">
            <div class="flex justify-between items-center border-b pb-4 mb-8">
                <h2 class="text-3xl font-black uppercase">🏆 Bouclier du Tournoi</h2>
                <div class="flex gap-2">
                    <button onclick="computeTrophy(true, true)" class="bg-green-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">✅ Valider Podium Final</button>
                    <button onclick="exportTrophyCSV()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">📥 Excel</button>
                </div>
            </div>
            <div id="trophy-podium" class="flex justify-center items-end h-64 gap-4 mb-12"></div>
            <table class="excel-table w-full">
                <thead class="bg-slate-100 text-[10px] font-black uppercase"><tr><th>Rang</th><th>Club</th><th>U8</th><th>U10</th><th>U12</th><th>Total Pts</th></tr></thead>
                <tbody id="trophy-tbody"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    // --- MOTEUR DE DONNÉES ---
    var STORAGE_KEY = 't3n_master_v47';
    var MATRICES = {
        3: [{a:1,b:2,arb:3},{a:2,b:3,arb:1},{a:1,b:3,arb:2}],
        4: [{a:1,b:3,arb:4},{a:2,b:4,arb:1},{a:3,b:4,arb:2},{a:1,b:2,arb:3},{a:1,b:4,arb:2},{a:2,b:3,arb:1}],
        5: [{a:1,b:3,arb:5},{a:2,b:4,arb:3},{a:1,b:5,arb:2},{a:3,b:4,arb:1},{a:2,b:5,arb:4},{a:1,b:2,arb:4},{a:3,b:5,arb:2},{a:1,b:4,arb:5},{a:2,b:3,arb:1},{a:4,b:5,arb:3}],
        6: [{a:1,b:3,arb:2},{a:5,b:6,arb:4},{a:2,b:4,arb:1},{a:3,b:6,arb:5},{a:1,b:5,arb:6},{a:3,b:4,arb:2},{a:1,b:6,arb:3},{a:2,b:5,arb:4},{a:1,b:2,arb:5},{a:4,b:6,arb:3},{a:3,b:5,arb:1},{a:2,b:6,arb:4},{a:1,b:4,arb:5},{a:2,b:3,arb:6},{a:4,b:5,arb:3}]
    };
    var RECIPES = [
        { teams: 14, p1: {p4:2, p3:2, str:"2x4, 2x3"}, p2: {p6:1, p4:2, str:"1x6, 2x4"} },
        { teams: 16, p1: {p4:4, str:"4x4"}, p2: {p4:4, str:"4x4"} },
        { teams: 18, p1: {p6:3, str:"3x6"}, p2: {p6:3, str:"3x6"} },
        { teams: 20, p1: {p4:5, str:"5x4"}, p2: {p5:4, str:"4x5"} },
        { teams: 24, p1: {p4:6, str:"6x4"}, p2: {p4:6, str:"6x4"} }
    ];

    var appState = { 
        tournoiId: '', pinCode: '', 
        branding: { name: 'TOURNOI', color: '#f59e0b', baseUrl: '', logoClub: '', logoYear: '' },
        masterData: [], activeCat: 'U10', currentPhase: 'PHASE1', activePouleTab: 'A',
        cats: { 'U6': initCat(), 'U8': initCat(), 'U10': initCat(), 'U12': initCat() }
    };
    function initCat() { return { settings: { p1: 120, p2: 120, bt: 2 }, phase1: { poules: [], reserve: [], validated: false, formatStr: null }, phase2: { poules: [], reserve: [], validated: false, formatStr: null, targetConfig: null } }; }

    var firebaseConfig = { apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI", databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // --- INITIALISATION ---
    function initApp() {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { try { appState = JSON.parse(saved); } catch(e) {} }
        if (appState.tournoiId) { document.getElementById('sas-entree').classList.add('hidden'); setupTournament(); }
    }

    function validerSas() {
        var id = document.getElementById('sas-id').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '_');
        var pin = document.getElementById('sas-pin').value;
        if (id.length < 3 || pin.length < 4) return alert("ID (min 3) et PIN (4 chiffres) requis.");
        appState.tournoiId = id; appState.pinCode = pin; appState.branding.name = id;
        saveState(); location.reload();
    }

    function setupTournament() {
        document.getElementById('header-title').innerText = appState.branding.name;
        document.getElementById('cfg-tournoi-name').value = appState.branding.name;
        document.getElementById('cfg-theme-color').value = appState.branding.color;
        document.documentElement.style.setProperty('--primary-color', appState.branding.color);
        if(appState.branding.baseUrl) document.getElementById('cfg-base-url').value = appState.branding.baseUrl;
        showTab('IMPORT');
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); var ind = document.getElementById('save-indicator'); ind.classList.remove('opacity-0'); setTimeout(()=>ind.classList.add('opacity-0'), 1000); }

    // --- BRANDING ---
    function updateBranding() {
        appState.branding.name = document.getElementById('cfg-tournoi-name').value;
        appState.branding.color = document.getElementById('cfg-theme-color').value;
        saveState(); setupTournament();
        if(db && appState.tournoiId) db.ref(`t3n/${appState.tournoiId}/branding`).set(appState.branding);
    }

    function handleImage(input, key) {
        var file = input.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas'); var ctx = canvas.getContext('2d');
                var max = 150; var w = img.width; var h = img.height;
                if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                appState.branding[key] = canvas.toDataURL('image/png', 0.7); updateBranding();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- NAVIGATION ---
    function showTab(id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        var b = document.getElementById('tab-'+id); if(b) b.classList.add('active-tab');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        if (id === 'IMPORT' || id === 'TROPHEE') { document.getElementById('content-'+id).classList.remove('hidden'); }
        else { appState.activeCat = id; document.getElementById('content-CAT').classList.remove('hidden'); document.getElementById('active-cat-title').innerText = id; initCategoryUI(); }
        if(id === 'TROPHEE') computeTrophy(false, false);
    }

    function switchCatPhase(ph) { appState.currentPhase = ph; initCategoryUI(); }

    function initCategoryUI() {
        var catData = appState.cats[appState.activeCat];
        var phData = catData[appState.currentPhase.toLowerCase()];
        document.getElementById('cfg-p1').value = catData.settings.p1;
        document.getElementById('cfg-p2').value = catData.settings.p2;
        document.getElementById('cfg-bt').value = catData.settings.bt;
        
        if(appState.currentPhase === 'PHASE1') {
            document.getElementById('architect-panel').classList.remove('hidden');
            document.getElementById('phase2-panel').classList.add('hidden');
            renderArchitect(phData);
        } else {
            document.getElementById('architect-panel').classList.add('hidden');
            document.getElementById('phase2-panel').classList.remove('hidden');
        }
        renderBoard(phData); renderReserve();
    }

    // --- ARCHITECTE ---
    function renderArchitect(phase) {
        var teams = getActiveTeams(phase);
        document.getElementById('active-cat-count').innerText = teams.length;
        var list = document.getElementById('scenario-list'); list.innerHTML = "";
        
        var recipes = RECIPES.filter(r => r.teams === teams.length);
        if(!recipes.length) {
            list.innerHTML = `<p class="text-[9px] text-red-500 font-bold uppercase">Format personnalisé requis</p>`;
            return;
        }

        recipes.forEach(r => {
            var div = document.createElement('div');
            div.className = "scenario-card p-2 rounded-xl text-[10px] " + (phase.formatStr === r.p1.str ? 'scenario-active':'');
            div.innerHTML = `<p class="font-black">${r.p1.str} (AM: ${r.p2.str})</p>`;
            div.onclick = () => { applyRecipe(r, teams); };
            list.appendChild(div);
        });
    }

    function applyRecipe(r, teams) {
        var cat = appState.cats[appState.activeCat];
        var p1 = cat.phase1; var p2 = cat.phase2;
        p1.formatStr = r.p1.str; p1.poules = []; p1.reserve = [];
        
        // Création Poules P1
        var letters = "ABCDEFGHIJKLMNOP";
        var addP = (n, target) => { for(var i=0; i<n; i++) p1.poules.push({ letter: letters[p1.poules.length], target: target, tUsed: target>=5?2:1, teams: [], scores: {}, adjustments: {} }); };
        if(r.p1.p6) addP(r.p1.p6, 6); if(r.p1.p5) addP(r.p1.p5, 5); if(r.p1.p4) addP(r.p1.p4, 4); if(r.p1.p3) addP(r.p1.p3, 3);
        
        // Dispatch Équipes (Niveaux & Clubs différents)
        var sorted = teams.sort((a,b) => a.level - b.level);
        sorted.forEach(t => {
            var bestP = p1.poules.filter(p => p.teams.length < p.target).sort((a,b) => (a.teams.filter(x=>x.club===t.club).length - b.teams.filter(x=>x.club===t.club).length) || (a.teams.length - b.teams.length))[0];
            if(bestP) bestP.teams.push(t); else p1.reserve.push(t);
        });

        // Config AM (Fantômes)
        p2.poules = []; p2.validated = false;
        var addP2 = (n, target) => { for(var i=0; i<n; i++) p2.poules.push({ letter: letters[p2.poules.length], target: target, tUsed: target>=5?2:1, teams: [], scores: {}, adjustments: {} }); };
        if(r.p2.p6) addP2(r.p2.p6, 6); if(r.p2.p5) addP2(r.p2.p5, 5); if(r.p2.p4) addP2(r.p2.p4, 4); if(r.p2.p3) addP2(r.p2.p3, 3);
        
        var tIdx = 0; p2.poules.forEach(p => { for(var i=0; i<p.target; i++) { p.teams.push({ id:'ghost_'+tIdx, name: 'Place '+(++tIdx), isDummy: true }); } });
        
        appState.activePouleTab = 'A'; saveState(); initCategoryUI();
    }

    function validateFormat() { getActivePhase().validated = true; saveState(); renderBoard(getActivePhase()); }

    // --- BOARD ET MATCHS ---
    function renderBoard(phase) {
        var container = document.getElementById('match-board');
        var tabs = document.getElementById('poule-tabs');
        if(!phase.poules.length) { container.innerHTML = ""; tabs.innerHTML = ""; document.getElementById('deploy-zone').classList.add('hidden'); return; }
        
        document.getElementById('deploy-zone').classList.toggle('hidden', !phase.validated);
        
        if(!phase.validated) {
            tabs.innerHTML = "";
            container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";
            container.innerHTML = phase.poules.map((p, pIdx) => `
                <div class="bg-white p-4 rounded-2xl border-2 shadow-sm ${p.teams.length !== p.target ? 'border-red-300':'border-slate-200'}" ondragover="allowDrop(event)" ondrop="dropToPoule(event, ${pIdx})">
                    <h3 class="font-black uppercase text-xs mb-3">Poule ${p.letter} (${p.teams.length}/${p.target})</h3>
                    <div class="space-y-1 min-h-[50px]">${p.teams.map((t, tIdx) => `<div draggable="true" ondragstart="dragFromPoule(event, ${pIdx}, ${tIdx})" class="p-2 bg-slate-50 border rounded-lg text-[10px] font-bold cursor-move">${t.name}</div>`).join('')}</div>
                </div>`).join('');
            document.getElementById('validation-zone').classList.remove('hidden');
        } else {
            container.className = "";
            document.getElementById('validation-zone').classList.add('hidden');
            tabs.innerHTML = phase.poules.map(p => `<button onclick="appState.activePouleTab='${p.letter}';renderBoard(getActivePhase())" class="px-4 py-2 rounded-lg font-black text-[10px] uppercase ${appState.activePouleTab===p.letter?'active-poule-tab shadow-md':'bg-white text-slate-500'}">Poule ${p.letter}</button>`).join('');
            
            var pIdx = phase.poules.findIndex(x => x.letter === appState.activePouleTab); if(pIdx===-1) pIdx=0;
            var p = phase.poules[pIdx];
            
            var currentT = 1; phase.poules.slice(0, pIdx).forEach(prev => currentT += prev.tUsed);
            
            var rows = MATRICES[p.target].map((m, mIdx) => {
                var ter = p.tUsed === 2 ? (mIdx % 2 === 0 ? currentT : currentT+1) : currentT;
                var sc = p.scores[mIdx] || {s1:'', s2:'', locked:false};
                return `<tr>
                    <td class="font-bold bg-slate-50">T.${ter}</td>
                    <td class="excel-yellow font-bold">${p.teams[m.b-1]?.name||'?'}</td>
                    <td class="p-0"><input type="number" value="${sc.s1}" onchange="updateScore(${pIdx}, ${mIdx}, 's1', this.value)" class="w-full text-center font-black h-8 outline-none"></td>
                    <td class="p-0"><input type="number" value="${sc.s2}" onchange="updateScore(${pIdx}, ${mIdx}, 's2', this.value)" class="w-full text-center font-black h-8 outline-none"></td>
                    <td class="font-bold">${p.teams[m.a-1]?.name||'?'}</td>
                    <td class="text-[9px] uppercase font-bold text-slate-400">${p.teams[m.arb-1]?.name||'ARBITRE'}</td>
                    <td><input type="checkbox" ${sc.locked?'checked':''} onchange="toggleLock(${pIdx}, ${mIdx}, this.checked)" class="accent-red-500"></td>
                </tr>`;
            }).join('');

            var ranking = computeRanking(p).map((r, idx) => `<tr><td class="excel-yellow">${idx+1}</td><td class="text-left font-bold px-2">${r.name}</td><td class="font-black text-amber-600">${r.pts}</td><td class="font-bold">${r.diff}</td></tr>`).join('');

            container.innerHTML = `<div class="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col lg:flex-row gap-6">
                <div class="flex-1"><h3 class="font-black uppercase mb-4 italic">Matchs Poule ${p.letter}</h3><table class="excel-table w-full"><thead><tr class="excel-header"><th>Ter.</th><th>Equipe 1</th><th>S1</th><th>S2</th><th>Equipe 2</th><th>Arbitre</th><th>L</th></tr></thead><tbody>${rows}</tbody></table></div>
                <div class="w-full lg:w-1/3"><h3 class="font-black uppercase mb-4 italic">Classement</h3><table class="excel-table w-full"><thead><tr class="excel-header"><th>Cls</th><th>Club</th><th>Pts</th><th>Diff</th></tr></thead><tbody>${ranking}</tbody></table></div>
            </div>`;
        }
    }

    // --- IMPRESSION PRO ---
    function imprimerPouleActive() {
        var cat = appState.activeCat;
        var phase = getActivePhase();
        var pIdx = phase.poules.findIndex(x => x.letter === appState.activePouleTab);
        var p = phase.poules[pIdx]; if(!p) return;
        
        var currentT = 1; phase.poules.slice(0, pIdx).forEach(prev => currentT += prev.tUsed);
        var phTitle = appState.currentPhase === 'PHASE1' ? 'BRASSAGE (MATIN)' : 'CLASSEMENT (AM)';

        var html = `
            <div style="font-family:sans-serif; text-align:center;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid black; padding-bottom:10px; margin-bottom:20px;">
                    ${appState.branding.logoClub ? `<img src="${appState.branding.logoClub}" style="height:60px;">` : '<div></div>'}
                    <div>
                        <h1 style="margin:0; text-transform:uppercase;">${appState.branding.name}</h1>
                        <h2 style="margin:0; color:#f59e0b;">${cat} - ${phTitle}</h2>
                    </div>
                    ${appState.branding.logoYear ? `<img src="${appState.branding.logoYear}" style="height:60px;">` : '<div></div>'}
                </div>
                <h2 style="background:black; color:white; display:inline-block; padding:5px 30px; text-transform:uppercase; margin-bottom:20px;">Poule ${p.letter}</h2>
                <table style="width:100%; border-collapse:collapse; border:2px solid black;">
                    <thead><tr style="background:#eee;">
                        <th style="border:1px solid black; padding:10px;">TERRAIN</th>
                        <th style="border:1px solid black; padding:10px;">EQUIPE 1</th>
                        <th style="border:1px solid black; padding:10px;" colspan="2">SCORES</th>
                        <th style="border:1px solid black; padding:10px;">EQUIPE 2</th>
                        <th style="border:1px solid black; padding:10px;">ARBITRE</th>
                    </tr></thead>
                    <tbody>${MATRICES[p.target].map((m, idx) => {
                        var ter = p.tUsed === 2 ? (idx % 2 === 0 ? currentT : currentT+1) : currentT;
                        var sc = p.scores[idx] || {s1:'', s2:''};
                        return `<tr>
                            <td style="border:1px solid black; padding:10px; font-weight:bold;">T.${ter}</td>
                            <td style="border:1px solid black; padding:10px;">${p.teams[m.b-1]?.name||'?'}</td>
                            <td style="border:1px solid black; padding:10px; width:40px; font-weight:bold;">${sc.s1}</td>
                            <td style="border:1px solid black; padding:10px; width:40px; font-weight:bold;">${sc.s2}</td>
                            <td style="border:1px solid black; padding:10px;">${p.teams[m.a-1]?.name||'?'}</td>
                            <td style="border:1px solid black; padding:10px; font-size:10px;">${p.teams[m.arb-1]?.name||'---'}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>
                <div style="margin-top:40px; width:60%; margin-left:auto; margin-right:auto;">
                    <h3 style="border-bottom:2px solid black; text-align:left; padding-bottom:5px;">CLASSEMENT POULE ${p.letter}</h3>
                    <table style="width:100%; border-collapse:collapse; border:2px solid black; margin-top:10px;">
                        <thead><tr style="background:#f9f9f9;"><th>RANG</th><th style="text-align:left; padding-left:10px;">CLUB</th><th>PTS</th><th>DIFF</th></tr></thead>
                        <tbody>${computeRanking(p).map((r, i) => `<tr><td style="border:1px solid black; padding:8px; font-weight:bold;">${i+1}</td><td style="border:1px solid black; padding:8px; text-align:left;">${r.name}</td><td style="border:1px solid black; padding:8px;">${r.pts}</td><td style="border:1px solid black; padding:8px;">${r.diff}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
        var win = window.open('', '_blank');
        win.document.write(`<html><head><title>Print Poule</title></head><body onload="window.print();window.close()">${html}</body></html>`);
        win.document.close();
    }

    // --- PÉRÉQUATION PHASE 2 ---
    function generatePhase2() {
        var cat = appState.cats[appState.activeCat];
        var p1 = cat.phase1; var p2 = cat.phase2;
        if(!p1.validated) return alert("Validez le matin d'abord.");
        
        var all = [];
        p1.poules.forEach(p => {
            var ranks = computeRanking(p);
            ranks.forEach((r, idx) => {
                if(r.ogTeam && !r.ogTeam.isDummy) {
                    all.push({ ...r.ogTeam, rank: idx+1, pts: r.pts, diff: r.diff });
                }
            });
        });

        all.sort((a,b) => a.rank - b.rank || b.pts - a.pts || b.diff - a.diff);
        
        var tIdx = 0;
        p2.poules.forEach(p => {
            p.teams = [];
            for(var i=0; i<p.target; i++) { if(all[tIdx]) p.teams.push(all[tIdx++]); }
        });
        
        appState.currentPhase = 'PHASE2'; saveState(); initCategoryUI();
    }

    // --- SCORES & SYNC ---
    function updateScore(pIdx, mIdx, f, v) {
        var p = getActivePhase().poules[pIdx]; if(!p.scores[mIdx]) p.scores[mIdx]={s1:'', s2:'', locked:false};
        p.scores[mIdx][f] = v; saveState(); renderBoard(getActivePhase());
        if(db && appState.tournoiId) db.ref(`t3n/${appState.tournoiId}/${appState.activeCat}_${appState.currentPhase}/matches/P${p.letter}_M${mIdx+1}`).update({ [f]: v === '' ? '' : parseInt(v), auth_token: appState.pinCode });
        syncStandings();
    }

    function toggleLock(pIdx, mIdx, l) {
        var p = getActivePhase().poules[pIdx]; if(!p.scores[mIdx]) p.scores[mIdx]={s1:'', s2:'', locked:false};
        p.scores[mIdx].locked = l; saveState(); renderBoard(getActivePhase());
        if(db && appState.tournoiId) db.ref(`t3n/${appState.tournoiId}/${appState.activeCat}_${appState.currentPhase}/matches/P${p.letter}_M${mIdx+1}`).update({ locked: l, auth_token: appState.pinCode });
    }

    function syncStandings() {
        if(!db || !appState.tournoiId) return;
        var phase = getActivePhase(); var standings = {};
        phase.poules.forEach(p => { if(p.teams.length === p.target) standings[p.letter] = JSON.stringify(computeRanking(p)); });
        db.ref(`t3n/${appState.tournoiId}/${appState.activeCat}_${appState.currentPhase}/standings`).set(standings);
    }

    function computeRanking(p) {
        var stats = p.teams.map((t, idx) => ({ id: idx, ogTeam: t, name: t?.name||'?', pts: 0, diff: 0 }));
        Object.keys(p.scores).forEach(mIdx => {
            var sc = p.scores[mIdx]; if(sc.s1 === '' || sc.s2 === '') return;
            var m = MATRICES[p.target][mIdx]; if(!m) return;
            var s1 = parseInt(sc.s1), s2 = parseInt(sc.s2);
            var tA = stats[m.a-1], tB = stats[m.b-1];
            if(tA && tB) {
                tA.diff += (s1-s2); tB.diff += (s2-s1);
                if(s1 > s2) { tA.pts += 3; tB.pts += 1; } else if(s2 > s1) { tA.pts += 1; tB.pts += 3; } else { tA.pts += 2; tB.pts += 2; }
            }
        });
        return stats.sort((a,b) => b.pts - a.pts || b.diff - a.diff);
    }

    // --- QR CODES ---
    function openQRModal() { document.getElementById('qr-modal').classList.remove('hidden'); document.getElementById('qr-modal').classList.add('flex'); renderQRCodes(); }
    function renderQRCodes() {
        var baseUrl = (appState.branding.baseUrl || "https://osartori-create.github.io/t3nations").replace(/\/$/, "");
        var tId = appState.tournoiId; var pin = appState.pinCode;
        var container = document.getElementById('qr-terrains-list'); container.innerHTML = "";
        
        ['U8', 'U10', 'U12'].forEach(cat => {
            var h = document.createElement('div'); h.className = "col-span-full border-b font-black text-sm uppercase mt-4 mb-2"; h.innerText = "Catégorie " + cat;
            container.appendChild(h);
            var grid = document.createElement('div'); grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4";
            for(var i=1; i<=8; i++) {
                var url = `${baseUrl}/terrain.html?id=${tId}&cat=${cat}&t=${i}&key=${pin}`;
                var card = document.createElement('div'); card.className = "bg-white p-2 border rounded-xl flex flex-col items-center text-center shadow-sm";
                var label = document.createElement('p'); label.className = "text-[9px] font-black mb-1"; label.innerText = cat + " - T." + i;
                var qrDiv = document.createElement('div'); new QRCode(qrDiv, { text: url, width: 80, height: 80 });
                card.appendChild(label); card.appendChild(qrDiv); grid.appendChild(card);
            }
            container.appendChild(grid);
        });
    }

    // --- TROPHEE ---
    function computeTrophy(broadcast, definitive) {
        var clubs = {}; appState.masterData.forEach(c => clubs[c.name] = { name: c.name, U8: 999, U10: 999, U12: 999, pts: 0 });
        ['U8', 'U10', 'U12'].forEach(cat => {
            var p2 = appState.cats[cat].phase2; if(!p2.poules.length) return;
            var abs = 1; p2.poules.forEach(p => { 
                var r = computeRanking(p); r.forEach((team, idx) => { var c = team.ogTeam?.club; if(c && clubs[c]) if(abs+idx < clubs[c][cat]) clubs[c][cat] = abs+idx; });
                abs += p.target;
            });
        });
        var ptsMap = {1:10, 2:9, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1};
        Object.keys(clubs).forEach(k => { var c = clubs[k]; ['U8', 'U10', 'U12'].forEach(cat => { if(c[cat]<=10) c.pts += ptsMap[c[cat]]; }); });
        var sorted = Object.values(clubs).filter(c => c.pts > 0).sort((a,b) => b.pts - a.pts || a.U12 - b.U12);
        
        document.getElementById('trophy-tbody').innerHTML = sorted.map((c, i) => `<tr><td>${i+1}</td><td class="text-left font-bold px-4">${c.name}</td><td>${c.U8===999?'-':c.U8}</td><td>${c.U10===999?'-':c.U10}</td><td>${c.U12===999?'-':c.U12}</td><td class="font-black text-amber-600">${c.pts}</td></tr>`).join('');
        if(broadcast && db && appState.tournoiId) db.ref(`t3n/${appState.tournoiId}/trophy`).set({ status: definitive?'final':'live', data: JSON.stringify(sorted) });
    }

    // --- UTILS ---
    function getActivePhase() { return appState.cats[appState.activeCat][appState.currentPhase.toLowerCase()]; }
    function getActiveTeams(phase) { var teams = []; phase.reserve.forEach(t => { if(!t.isForfait) teams.push(t); }); phase.poules.forEach(p => p.teams.forEach(t => { if(!t.isForfait) teams.push(t); })); if(!teams.length && phase.teams) phase.teams.forEach(t => { if(!t.isForfait) teams.push(t); }); return teams; }
    function processMasterImport() {
        var raw = document.getElementById('csv-input').value; var lines = raw.split('\n'); appState.masterData = [];
        lines.forEach((l, i) => {
            var p = l.trim().split(/\s+/);
            if(p.length >= 5) {
                var u12 = parseInt(p.pop()); var u10 = parseInt(p.pop()); var u8 = parseInt(p.pop()); var u6 = parseInt(p.pop());
                appState.masterData.push({ id:'club_'+i, name: p.join(' '), u6:u6, u8:u8, u10:u10, u12:u12 });
            }
        });
        syncTeamsWithMaster(); saveState(); renderMasterTable();
    }
    function syncTeamsWithMaster() {
        ['U6', 'U8', 'U10', 'U12'].forEach(cat => {
            var ph = appState.cats[cat].phase1; ph.reserve = [];
            appState.masterData.forEach(c => { for(var i=1; i<=c[cat.toLowerCase()]; i++) ph.reserve.push({ id: c.id+'_'+i, club: c.name, level: i, name: c.name+' '+i, isForfait: false }); });
        });
    }
    function renderMasterTable() {
        document.getElementById('master-thead').innerHTML = `<tr><th class="p-2">Club</th><th>U6</th><th>U8</th><th>U10</th><th>U12</th></tr>`;
        document.getElementById('master-tbody').innerHTML = appState.masterData.map(c => `<tr><td class="p-2 font-bold">${c.name}</td><td>${c.u6}</td><td>${c.u8}</td><td>${c.u10}</td><td>${c.u12}</td></tr>`).join('');
        document.getElementById('master-table-container').classList.remove('hidden');
    }
    function allowDrop(e) { e.preventDefault(); }
    function dragFromPoule(e, pIdx, tIdx) { e.dataTransfer.setData("json", JSON.stringify({ src: 'poule', pIdx, tIdx })); }
    function dragFromReserve(e, tIdx) { e.dataTransfer.setData("json", JSON.stringify({ src: 'reserve', tIdx })); }
    function dropToPoule(e, targetPIdx) { e.preventDefault(); var d = JSON.parse(e.dataTransfer.getData("json")); var ph = getActivePhase(); var t = d.src === 'poule' ? ph.poules[d.pIdx].teams.splice(d.tIdx, 1)[0] : ph.reserve.splice(d.tIdx, 1)[0]; if(t) { ph.poules[targetPIdx].teams.push(t); saveState(); renderBoard(ph); renderReserve(); } }
    function dropToReserve(e) { e.preventDefault(); var d = JSON.parse(e.dataTransfer.getData("json")); var ph = getActivePhase(); if(d.src === 'poule') { ph.reserve.push(ph.poules[d.pIdx].teams.splice(d.tIdx, 1)[0]); saveState(); renderBoard(ph); renderReserve(); } }
    function renderReserve() {
        var r = getActivePhase().reserve; document.getElementById('reserve-count').innerText = r.length;
        document.getElementById('reserve-zone').innerHTML = r.map((t, i) => `<div draggable="true" ondragstart="dragFromReserve(event, ${i})" class="p-1 bg-white border rounded text-[10px] font-bold cursor-move">${t.name}</div>`).join('');
    }
    function exportClubsCSV() { var csv = "Club;U6;U8;U10;U12\n"; appState.masterData.forEach(c => csv += `${c.name};${c.u6};${c.u8};${c.u10};${c.u12}\n`); downloadCSV(csv, "clubs.csv"); }
    function downloadCSV(csv, name) { var blob = new Blob(["\ufeff"+csv], {type: 'text/csv'}); var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = name; a.click(); }
</script>
