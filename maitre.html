<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N Master v31 - Compatibilité Totale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .tab-btn { color: white; opacity: 0.7; transition: all 0.2s; }
        .tab-btn.active-tab { opacity: 1; background: #f59e0b; color: #000; }
        .tab-btn.active-u8 { background: #2563eb !important; color: white !important; }
        .tab-btn.active-u10 { background: #ffffff !important; color: #0f172a !important; }
        .tab-btn.active-u12 { background: #dc2626 !important; color: white !important; }
        .excel-table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #cbd5e1; padding: 6px 4px; }
        .excel-header { background-color: #f1f5f9; font-weight: 900; text-transform: uppercase; font-size: 10px;}
        .excel-yellow { background-color: #fef08a; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen" onload="initApp()">

<header class="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 border-amber-500 sticky top-0 z-50">
    <div class="flex items-center gap-6">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">T3N <span class="text-amber-500 text-3xl">MASTER</span></h1>
        <input type="number" id="config-year" value="2026" class="bg-transparent border-none text-xs font-bold text-slate-400 w-16 focus:ring-0">
        <nav class="flex gap-1 bg-white/5 p-1 rounded-xl">
            <button onclick="showTab('IMPORT')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] active-tab" id="tab-IMPORT">Import</button>
            <button onclick="showTab('U6')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U6">U6</button>
            <button onclick="showTab('U8')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U8">U8</button>
            <button onclick="showTab('U10')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U10">U10</button>
            <button onclick="showTab('U12')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px]" id="tab-U12">U12</button>
            <button onclick="showTab('TROPHEE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] ml-4 text-amber-300" id="tab-TROPHEE">🏆 Trophée</button>
            <button onclick="showTab('MAINTENANCE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] ml-1 text-red-400" id="tab-MAINTENANCE">Purges</button>
        </nav>
    </div>
    <div id="sync-status" class="text-[9px] text-green-400 font-black uppercase tracking-widest animate-pulse hidden">● Live</div>
</header>

<main class="p-6 max-w-[1900px] mx-auto">
    <section id="content-IMPORT" class="tab-content space-y-6">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
            <h2 class="text-xl font-black uppercase mb-4 italic">1. Importation Sportive</h2>
            <textarea id="csv-input" rows="6" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-mono text-xs outline-none focus:border-amber-500 transition-colors" placeholder="Nom Club | U6 | U8 | U10 | U12"></textarea>
            <button onclick="processMasterImport()" class="w-full mt-4 bg-slate-900 text-white p-4 rounded-2xl font-black uppercase hover:bg-slate-800 shadow-lg active:scale-95 transition-all">Valider</button>
        </div>
        <div id="master-table-container" class="bg-white p-6 rounded-[2.5rem] border border-slate-200 hidden">
            <table class="w-full text-left text-sm"><tbody id="master-tbody" class="divide-y divide-slate-100 italic"></tbody></table>
        </div>
    </section>

    <section id="content-CAT" class="tab-content hidden">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm sticky top-24">
                    <h2 class="text-4xl font-black uppercase" id="active-cat-title">...</h2>
                    <div id="scenario-list" class="space-y-3 mt-4"></div>
                    <hr class="my-4">
                    <h3 class="text-[10px] font-black uppercase opacity-40 mb-3 tracking-widest">📦 Réserve</h3>
                    <div id="reserve-zone" ondragover="allowDrop(event)" ondrop="dropToReserve(event)" class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl p-4 min-h-[150px] flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="xl:col-span-9 space-y-4">
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                    <nav class="flex gap-2">
                        <button onclick="switchCatPhase('PHASE1')" id="tab-phase1" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg active-tab">Brassage</button>
                        <button onclick="switchCatPhase('PHASE2')" id="tab-phase2" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-slate-100 text-slate-500">Classement</button>
                    </nav>
                </div>
                <div id="validation-zone" class="hidden bg-amber-100 border border-amber-300 p-6 rounded-[2rem] flex justify-between items-center shadow-inner">
                    <p class="font-black text-amber-800 uppercase text-xs">Ajustez les équipes avant de valider.</p>
                    <button onclick="validateFormat()" class="bg-amber-500 text-black px-8 py-3 rounded-xl font-black uppercase shadow-md">Valider l'ossature</button>
                </div>
                <div id="poule-tabs" class="hidden flex gap-2 overflow-x-auto bg-slate-200 p-2 rounded-xl"></div>
                <div id="match-board" class="w-full"></div>
                <div id="deploy-zone" class="hidden bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-xl flex justify-between items-center border-b-4 border-amber-500 mt-4">
                    <p class="text-amber-500 font-black uppercase italic text-sm">Déploiement Firebase</p>
                    <button onclick="deployCategory()" class="bg-amber-500 hover:bg-amber-600 text-black px-8 py-3 rounded-xl font-black uppercase shadow-lg active:scale-95 transition-all">Envoyer aux Terrains</button>
                </div>
            </div>
        </div>
    </section>

    <section id="content-MAINTENANCE" class="tab-content hidden space-y-6">
        <div class="bg-white p-8 rounded-[2.5rem] border-2 border-red-100 shadow-xl max-w-xl mx-auto text-center">
            <h2 class="text-2xl font-black uppercase text-red-600 mb-6">Reset Complet</h2>
            <button onclick="purgeALL()" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase shadow-xl hover:scale-105 transition-transform">💣 Vider le navigateur 💣</button>
            <p class="text-[10px] text-slate-400 mt-4 italic">Utilisez ceci si les boutons ne répondent plus.</p>
        </div>
    </section>
</main>

<script>
    // --- V31 : AUCUNE SYNTAXE MODERNE TYPE "?." POUR EVITER LES CRASHES ---
    var STORAGE_KEY = 't3n_master_v31';

    // --- CONFIGURATION FIREBASE ---
    var firebaseConfig = { 
        apiKey: "VOTRE_API_KEY", 
        authDomain: "t3nations.firebaseapp.com", 
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "t3nations" 
    };

    if (firebaseConfig.apiKey !== "VOTRE_API_KEY" && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    var db = (firebase.apps.length) ? firebase.database() : null;

    var MATRICES = {
        3: [{a:1,b:2,arb:3},{a:2,b:3,arb:1},{a:1,b:3,arb:2}],
        4: [{a:1,b:2,arb:4},{a:3,b:4,arb:1},{a:1,b:3,arb:2},{a:2,b:4,arb:3},{a:1,b:4,arb:2},{a:2,b:3,arb:1}],
        5: [{a:1,b:3,arb:5},{a:2,b:4,arb:3},{a:1,b:5,arb:2},{a:3,b:4,arb:1},{a:2,b:5,arb:4},{a:1,b:2,arb:4},{a:3,b:5,arb:2},{a:1,b:4,arb:5},{a:2,b:3,arb:1},{a:4,b:5,arb:3}],
        6: [{a:1,b:3,arb:2},{a:5,b:6,arb:4},{a:2,b:4,arb:1},{a:3,b:6,arb:5},{a:1,b:5,arb:6},{a:3,b:4,arb:2},{a:1,b:6,arb:3},{a:2,b:5,arb:4},{a:1,b:2,arb:5},{a:4,b:6,arb:3},{a:3,b:5,arb:1},{a:2,b:6,arb:4},{a:1,b:4,arb:5},{a:2,b:3,arb:6},{a:4,b:5,arb:3}]
    };

    var appState = { 
        masterData: [], 
        activeCat: 'U10', 
        currentPhase: 'PHASE1', 
        activePouleTab: 'A',
        cats: { 
            'U6': initCat(), 'U8': initCat(), 'U10': initCat(), 'U12': initCat() 
        } 
    };

    function initCat() { 
        return { 
            phase1: { poules: [], reserve: [], validated: false, formatStr: null },
            phase2: { poules: [], reserve: [], validated: false, formatStr: null }
        }; 
    }

    function initApp() {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try { appState = JSON.parse(saved); } catch(e) { console.error("Cache reset"); }
        }
        if (db) document.getElementById('sync-status').classList.remove('hidden');
        showTab(appState.activeCat || 'IMPORT');
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        var ind = document.getElementById('save-indicator');
        if(ind) { ind.classList.remove('opacity-0'); setTimeout(function(){ ind.classList.add('opacity-0'); }, 1000); }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active-tab', 'active-u8', 'active-u10', 'active-u12'); });
        var btn = document.getElementById('tab-' + id);
        if(btn) {
            btn.classList.add('active-tab');
            if(id === 'U8') btn.classList.add('active-u8');
            if(id === 'U10') btn.classList.add('active-u10');
            if(id === 'U12') btn.classList.add('active-u12');
        }
        document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.add('hidden'); });
        var content = document.getElementById('content-' + id);
        if(content) { 
            content.classList.remove('hidden'); 
        } else {
            document.getElementById('content-CAT').classList.remove('hidden');
            appState.activeCat = id;
            document.getElementById('active-cat-title').innerText = id;
            renderArchitect();
        }
        renderBoard();
        renderReserve();
        saveState();
    }

    function processMasterImport() {
        var raw = document.getElementById('csv-input').value;
        var lines = raw.split('\n').filter(function(l){ return l.trim().length > 0; });
        appState.masterData = lines.map(function(l, i){ 
            var p = l.split(/\t|,/);
            return { id: 'c'+i, name: p[0], u8: 1, u10: 1, u12: 1 };
        });
        alert("Clubs importés !");
        saveState();
        renderMasterTable();
    }

    function renderMasterTable() {
        var html = appState.masterData.map(function(c){
            return '<tr><td class="p-3 font-bold uppercase text-xs">'+c.name+'</td><td class="p-3 text-center text-amber-600 font-black">'+c.u10+' eq.</td></tr>';
        }).join('');
        document.getElementById('master-tbody').innerHTML = html;
        document.getElementById('master-table-container').classList.remove('hidden');
    }

    function renderArchitect() {
        var cat = appState.cats[appState.activeCat];
        var total = appState.masterData.length;
        var list = document.getElementById('scenario-list');
        list.innerHTML = '<button onclick="applyAuto(4)" class="w-full p-4 bg-indigo-600 text-white rounded-xl font-black uppercase text-xs shadow-lg">Générer Poules de 4</button>';
    }

    function applyAuto(size) {
        var phase = appState.cats[appState.activeCat].phase1;
        phase.poules = []; phase.reserve = [];
        var teams = [];
        appState.masterData.forEach(function(c){ 
            teams.push({ id: c.id, name: c.name, club: c.name, isDummy: false });
        });
        
        var nbPoules = Math.floor(teams.length / size);
        for(var i=0; i<nbPoules; i++) {
            phase.poules.push({ letter: String.fromCharCode(65+i), target: size, teams: teams.splice(0, size), scores: {} });
        }
        phase.reserve = teams;
        phase.validated = false;
        saveState();
        renderBoard();
        renderReserve();
    }

    function renderBoard() {
        var phase = appState.cats[appState.activeCat][appState.currentPhase.toLowerCase()];
        var board = document.getElementById('match-board');
        if(!phase.poules || phase.poules.length === 0) { board.innerHTML = ""; return; }

        if(!phase.validated) {
            document.getElementById('validation-zone').classList.remove('hidden');
            board.className = "grid grid-cols-3 gap-4";
            board.innerHTML = phase.poules.map(function(p, i){
                return '<div class="bg-white p-4 rounded-xl border-2"><b>Poule '+p.letter+'</b><div class="mt-2 space-y-1">'+p.teams.map(function(t){ return '<div class="p-2 bg-slate-50 border rounded text-[10px] font-bold">'+t.name+'</div>'; }).join('')+'</div></div>';
            }).join('');
        } else {
            document.getElementById('validation-zone').classList.add('hidden');
            document.getElementById('deploy-zone').classList.remove('hidden');
            board.className = "bg-white p-6 rounded-3xl border-2";
            board.innerHTML = "<p class='font-black uppercase italic'>Tableau des scores prêt pour le déploiement.</p>";
        }
    }

    function validateFormat() {
        appState.cats[appState.activeCat][appState.currentPhase.toLowerCase()].validated = true;
        saveState();
        renderBoard();
    }

    function renderReserve() {
        var res = appState.cats[appState.activeCat][appState.currentPhase.toLowerCase()].reserve;
        document.getElementById('reserve-zone').innerHTML = res.map(function(t){
            return '<div class="p-2 bg-white border rounded text-[10px] font-bold">'+t.name+'</div>';
        }).join('') || '<p class="text-[10px] opacity-30 text-center">Vide</p>';
    }

    function purgeALL() {
        if(confirm("Supprimer toute la mémoire locale ?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function allowDrop(e) { e.preventDefault(); }
    function dropToReserve(e) { /* Simplified for V31 stability */ }
    function switchCatPhase(p) { appState.currentPhase = p; renderBoard(); saveState(); }
</script>
</body>
</html>
