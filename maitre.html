<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3N MASTER - Centre de Commandement</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js](https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js)"></script>
    <script src="[https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js](https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js)"></script>
    <style>
        .drag-ghost { opacity: 0.4; background: #fef3c7; }
        .drop-target { border-top: 4px solid #f59e0b; }
        .bg-u8 { background-color: #2563eb; } .bg-u10 { background-color: #f8fafc; color: #0f172a; } .bg-u12 { background-color: #dc2626; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans overflow-hidden h-screen flex flex-col">

    <!-- Header & Config -->
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase"><span class="text-amber-500">T3N</span> MASTER</h1>
            
            <!-- NOUVEAU: Sélecteur d'année pour forcer le bon chemin Firebase -->
            <select id="sel-year" onchange="switchContext()" class="bg-slate-700 p-2 rounded font-bold border-none text-amber-500">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>

            <select id="sel-cat" onchange="switchContext()" class="bg-slate-700 p-2 rounded font-bold uppercase border-none focus:ring-2 focus:ring-amber-500">
                <option value="U8" class="text-blue-400">U8 (Bleu)</option>
                <option value="U10" class="text-slate-400">U10 (Blanc)</option>
                <option value="U12" class="text-red-400">U12 (Rouge)</option>
            </select>
            <select id="sel-phase" onchange="switchContext()" class="bg-slate-700 p-2 rounded font-bold border-none">
                <option value="matin">Phase 1 (Matin)</option>
                <option value="apresmidi">Phase 2 (Après-midi)</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-import').classList.toggle('hidden')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-black uppercase text-xs">Importer JSON</button>
            <button onclick="document.getElementById('modal-manual').classList.toggle('hidden')" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded font-black uppercase text-xs">Création Manuelle</button>
            <button onclick="calculateGlobalRanking()" class="bg-amber-500 hover:bg-amber-600 px-4 py-2 rounded font-black uppercase text-xs text-slate-900 ml-4">Calculer Classement</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left: Match Monitor -->
        <section class="w-2/3 border-r border-slate-700 flex flex-col overflow-hidden">
            <div class="p-4 bg-slate-800/50 flex justify-between items-center">
                <h2 class="font-black uppercase tracking-widest text-slate-400">Moniteur des Scores Live</h2>
                <div id="sync-status" class="text-[10px] uppercase px-2 py-1 rounded bg-green-900/50 text-green-400 font-bold border border-green-700">Connecté</div>
            </div>
            <div id="matches-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 content-start">
                <!-- Les matchs s'affichent ici dynamiquement -->
            </div>
        </section>

        <!-- Right: Ranking & Export -->
        <section class="w-1/3 flex flex-col bg-slate-800/30 overflow-hidden">
            <div class="p-4 flex justify-between items-center border-b border-slate-700">
                <h2 class="font-black uppercase tracking-widest text-slate-400">Classement Global</h2>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-[10px] font-black uppercase">Copier vers Excel</button>
            </div>
            
            <div id="ranking-container" class="flex-1 overflow-y-auto p-2">
                <table class="w-full text-xs">
                    <thead class="sticky top-0 bg-slate-900 text-slate-500 uppercase font-black text-[10px]">
                        <tr>
                            <th class="p-2 text-left">Rang</th>
                            <th class="p-2 text-left">Equipe</th>
                            <th class="p-2 text-center">Pts</th>
                            <th class="p-2 text-center">GA</th>
                            <th class="p-2">Obs.</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        <!-- Lignes de classement avec Drag & Drop -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Import -->
    <div id="modal-import" class="hidden fixed inset-0 bg-slate-950/90 flex items-center justify-center p-6 z-50">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-2xl border border-slate-700 shadow-2xl">
            <h3 class="text-xl font-black mb-4 uppercase italic">Importer la configuration Gem <span class="text-red-500 text-sm">(Écrase les données)</span></h3>
            <textarea id="import-area" class="w-full h-64 bg-slate-900 border border-slate-700 rounded p-3 text-mono text-xs text-blue-400 focus:outline-none focus:ring-1 focus:ring-amber-500" placeholder='[{"poule": "A", "terrains": [1], "equipes": [...]}, ...]'></textarea>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="document.getElementById('modal-import').classList.add('hidden')" class="px-6 py-2 text-slate-400 font-bold uppercase text-xs">Annuler</button>
                <button onclick="processImport()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-black uppercase text-sm">Déployer (Remplace tout)</button>
            </div>
        </div>
    </div>

    <!-- Modal Création Manuelle -->
    <div id="modal-manual" class="hidden fixed inset-0 bg-slate-950/90 flex items-center justify-center p-6 z-50">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-lg border border-slate-700 shadow-2xl">
            <h3 class="text-xl font-black mb-4 uppercase italic">Création Manuelle de Poule <span class="text-green-500 text-sm">(Ajout)</span></h3>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-400">Nom Poule (Ex: A)</label>
                    <input type="text" id="man-poule" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white uppercase font-bold" placeholder="A">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-400">Format</label>
                    <select id="man-format" onchange="updateManualFields()" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-bold">
                        <option value="4" selected>4 Équipes</option>
                        <option value="3">3 Équipes</option>
                        <option value="5">5 Équipes</option>
                        <option value="6">6 Équipes</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] uppercase font-bold text-slate-400">Terrains (Ex: 1, 2)</label>
                    <input type="text" id="man-terrains" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white" placeholder="1">
                </div>
            </div>

            <div id="man-teams" class="space-y-2 mb-6"></div>

            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('modal-manual').classList.add('hidden')" class="px-4 py-2 text-slate-400 font-bold uppercase text-xs">Fermer</button>
                <button onclick="processManualCreation()" class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded font-black uppercase text-sm">Ajouter</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI",
            authDomain: "t3nations.firebaseapp.com",
            databaseURL: "[https://t3nations-default-rtdb.europe-west1.firebasedatabase.app](https://t3nations-default-rtdb.europe-west1.firebasedatabase.app)",
            projectId: "t3nations",
            storageBucket: "t3nations.firebasestorage.app",
            messagingSenderId: "368081588642",
            appId: "1:368081588642:web:c1f2c6a3c2c9b47929a2fb"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let currentData = { matches: {}, poules: [], overrides: {}, obs: {} };
        let globalRanking = [];
        const MATRICES = {
            3: [{a:1,b:2,arb:3},{a:2,b:3,arb:1},{a:1,b:3,arb:2}],
            4: [{a:1,b:2,arb:4},{a:3,b:4,arb:1},{a:1,b:3,arb:2},{a:2,b:4,arb:3},{a:1,b:4,arb:2},{a:2,b:3,arb:1}],
            5: [{a:1,b:3,arb:5},{a:2,b:4,arb:3},{a:1,b:5,arb:2},{a:3,b:4,arb:1},{a:2,b:5,arb:4},{a:1,b:2,arb:4},{a:3,b:5,arb:2},{a:1,b:4,arb:5},{a:2,b:3,arb:1},{a:4,b:5,arb:3}],
            6: [{a:1,b:3,arb:2},{a:5,b:6,arb:4},{a:2,b:4,arb:1},{a:3,b:6,arb:5},{a:1,b:5,arb:6},{a:3,b:4,arb:2},{a:1,b:6,arb:3},{a:2,b:5,arb:4},{a:1,b:2,arb:5},{a:4,b:6,arb:3},{a:3,b:5,arb:1},{a:2,b:6,arb:4},{a:1,b:4,arb:5},{a:2,b:3,arb:6},{a:4,b:5,arb:3}]
        };

        function switchContext() {
            const year = document.getElementById('sel-year').value;
            const cat = document.getElementById('sel-cat').value;
            const phase = document.getElementById('sel-phase').value;
            
            db.ref(`t3n/${year}/${cat}_${phase}`).on('value', snapshot => {
                currentData = snapshot.val() || { matches: {}, poules: [], overrides: {}, obs: {} };
                renderLiveFeed();
                calculateGlobalRanking();
            }, (error) => {
                console.error("Erreur de lecture Firebase:", error);
                document.getElementById('sync-status').innerText = "ERREUR LECTURE";
                document.getElementById('sync-status').className = "text-[10px] uppercase px-2 py-1 rounded bg-red-900/50 text-red-400 font-bold border border-red-700";
            });
        }

        function renderLiveFeed() {
            const container = document.getElementById('matches-grid');
            container.innerHTML = '';
            const sortedMatches = Object.entries(currentData.matches || {}).sort((a,b) => a[1].poule.localeCompare(b[1].poule));
            
            sortedMatches.forEach(([id, m]) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border flex items-center justify-between ${m.s1 || m.s2 ? 'bg-slate-800 border-slate-600' : 'bg-slate-800/20 border-slate-700/50 opacity-60'}`;
                div.innerHTML = `
                    <div class="flex flex-col gap-1 w-full">
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-500 uppercase">
                            <span>Poule ${m.poule} - Terrain ${m.terrain}</span>
                            <span class="${m.status === 'termine' ? 'text-green-500' : 'text-amber-500'}">${m.status || 'En attente'}</span>
                        </div>
                        <div class="flex justify-between items-center text-xs font-bold">
                            <span class="truncate w-24 uppercase">${m.t1}</span>
                            <span class="bg-slate-900 px-3 py-1 rounded-md text-amber-500 font-black text-lg">${m.s1 || 0} - ${m.s2 || 0}</span>
                            <span class="truncate w-24 text-right uppercase">${m.t2}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function calculateGlobalRanking() {
            const teams = {};
            const matches = Object.values(currentData.matches || {});
            
            matches.forEach(m => {
                [m.t1, m.t2].forEach(t => { if(!teams[t]) teams[t] = { name: t, pts: 0, pour: 0, contre: 0, diff: 0 } });
                
                if(m.s1 !== undefined && m.s2 !== undefined && (m.s1 > 0 || m.s2 > 0 || m.status === 'termine')) {
                    teams[m.t1].pour += m.s1; teams[m.t1].contre += m.s2;
                    teams[m.t2].pour += m.s2; teams[m.t2].contre += m.s1;
                    
                    if(m.s1 > m.s2) { teams[m.t1].pts += 3; teams[m.t2].pts += 1; }
                    else if(m.s1 < m.s2) { teams[m.t1].pts += 1; teams[m.t2].pts += 3; }
                    else { teams[m.t1].pts += 2; teams[m.t2].pts += 2; }
                }
            });

            Object.values(teams).forEach(t => t.diff = t.pour - t.contre);

            globalRanking = Object.values(teams).sort((a,b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                const overA = currentData.overrides && currentData.overrides[a.name] !== undefined ? currentData.overrides[a.name] : 999;
                const overB = currentData.overrides && currentData.overrides[b.name] !== undefined ? currentData.overrides[b.name] : 999;
                if (overA !== overB) return overA - overB;
                if (b.diff !== a.diff) return b.diff - a.diff;
                return b.pour - a.pour;
            });

            renderRanking();
        }

        function renderRanking() {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '';
            
            globalRanking.forEach((t, i) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-700/50 hover:bg-slate-700/30 cursor-move";
                tr.draggable = true;
                tr.dataset.index = i;
                
                tr.ondragstart = e => { e.target.classList.add('drag-ghost'); e.dataTransfer.setData('text/plain', i); };
                tr.ondragend = e => e.target.classList.remove('drag-ghost');
                tr.ondragover = e => { e.preventDefault(); tr.classList.add('drop-target'); };
                tr.ondragleave = e => tr.classList.remove('drop-target');
                tr.ondrop = e => { e.preventDefault(); tr.classList.remove('drop-target'); handleDrop(e.dataTransfer.getData('text/plain'), i); };

                const obsVal = currentData.obs && currentData.obs[t.name] ? currentData.obs[t.name] : '';

                tr.innerHTML = `
                    <td class="p-2 font-black text-slate-500">${i+1}${i===0?'er':'e'}</td>
                    <td class="p-2 font-bold uppercase truncate max-w-[120px]" title="Glissez pour forcer le départage">${t.name}</td>
                    <td class="p-2 text-center font-black text-blue-400">${t.pts}</td>
                    <td class="p-2 text-center text-slate-400">${t.diff > 0 ? '+'+t.diff : t.diff}</td>
                    <td class="p-1"><input type="text" value="${obsVal}" onchange="saveObs('${t.name}', this.value)" placeholder="ex: Etranger" class="bg-transparent border-none text-[9px] w-full focus:ring-0 text-amber-500 font-bold"></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function handleDrop(from, to) {
            const moved = globalRanking.splice(from, 1)[0];
            globalRanking.splice(to, 0, moved);
            
            let newOverrides = {};
            globalRanking.forEach((t, i) => { newOverrides[t.name] = i; });
            
            const year = document.getElementById('sel-year').value;
            const cat = document.getElementById('sel-cat').value;
            const phase = document.getElementById('sel-phase').value;
            db.ref(`t3n/${year}/${cat}_${phase}/overrides`).set(newOverrides);
        }

        function saveObs(teamName, value) {
            const year = document.getElementById('sel-year').value;
            const cat = document.getElementById('sel-cat').value;
            const phase = document.getElementById('sel-phase').value;
            db.ref(`t3n/${year}/${cat}_${phase}/obs/${teamName}`).set(value);
        }

        function processImport() {
            let raw = document.getElementById('import-area').value;
            raw = raw.replace(/[\u00A0]/g, " "); 
            
            // CORRECTION DU BUG D'AFFICHAGE "GRIS":
            // Remplacement des backticks sans utiliser directement le caractère
            raw = raw.replace(/`{3}json/gi, "");  
            raw = raw.replace(/`{3}/g, "");
            raw = raw.trim();

            try {
                const poules = JSON.parse(raw);
                const year = document.getElementById('sel-year').value;
                const cat = document.getElementById('sel-cat').value;
                const phase = document.getElementById('sel-phase').value;
                
                if(!confirm(`ATTENTION : Cela va effacer le tournoi actuel pour la catégorie ${cat} (${phase}). Continuer ?`)) return;

                let updates = { poules: poules, matches: {}, overrides: {}, obs: {} };

                poules.forEach(p => {
                    const nb = p.equipes.length;
                    const matrix = MATRICES[nb];
                    if(!matrix) return alert(`Format de poule de ${nb} non géré.`);
                    
                    matrix.forEach((match, idx) => {
                        const mid = `${p.poule}_M${idx+1}`;
                        updates.matches[mid] = {
                            poule: p.poule,
                            terrain: p.terrains[idx % p.terrains.length],
                            t1: p.equipes[match.a - 1],
                            t2: p.equipes[match.b - 1],
                            arb: p.equipes[match.arb - 1],
                            s1: 0, s2: 0, status: 'en_attente'
                        };
                    });
                });

                // NOUVEAU: Ajout du .catch() pour afficher les erreurs de base de données
                db.ref(`t3n/${year}/${cat}_${phase}`).set(updates)
                  .then(() => { 
                      alert("🚀 Tournoi déployé !"); 
                      document.getElementById('modal-import').classList.add('hidden'); 
                  })
                  .catch((error) => {
                      alert("❌ Erreur Firebase lors de l'enregistrement : " + error.message);
                  });
                  
            } catch(e) { alert("Erreur de format JSON. Vérifiez qu'il s'agit bien d'un tableau JSON valide."); }
        }

        function updateManualFields() {
            const format = parseInt(document.getElementById('man-format').value);
            const container = document.getElementById('man-teams');
            container.innerHTML = '';
            for(let i=1; i<=format; i++) {
                container.innerHTML += `
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Équipe ${i}</label>
                        <input type="text" id="man-team-${i}" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white font-bold" placeholder="Nom équipe ${i}">
                    </div>
                `;
            }
        }

        function processManualCreation() {
            const poule = document.getElementById('man-poule').value.toUpperCase().trim();
            const format = parseInt(document.getElementById('man-format').value);
            const terrainsRaw = document.getElementById('man-terrains').value;
            const terrains = terrainsRaw.split(',').map(t => t.trim()).filter(t => t);

            if(!poule || terrains.length === 0) return alert("Remplir la poule et les terrains.");

            const equipes = [];
            for(let i=1; i<=format; i++) {
                const eq = document.getElementById(`man-team-${i}`).value.trim();
                if(!eq) return alert(`L'équipe ${i} n'est pas renseignée.`);
                equipes.push(eq);
            }

            const matrix = MATRICES[format];
            let updates = {};

            matrix.forEach((match, idx) => {
                const mid = `${poule}_M${idx+1}`;
                updates[`matches/${mid}`] = {
                    poule: poule,
                    terrain: terrains[idx % terrains.length],
                    t1: equipes[match.a - 1],
                    t2: equipes[match.b - 1],
                    arb: equipes[match.arb - 1],
                    s1: 0, s2: 0, status: 'en_attente'
                };
            });

            const year = document.getElementById('sel-year').value;
            const cat = document.getElementById('sel-cat').value;
            const phase = document.getElementById('sel-phase').value;

            // NOUVEAU: Ajout du .catch() pour afficher les erreurs
            db.ref(`t3n/${year}/${cat}_${phase}`).update(updates)
              .then(() => {
                  alert(`✅ Poule ${poule} ajoutée !`);
                  for(let i=1; i<=format; i++) document.getElementById(`man-team-${i}`).value = '';
                  document.getElementById('man-poule').value = String.fromCharCode(poule.charCodeAt(0) + 1); 
              })
              .catch((error) => {
                  alert("❌ Erreur Firebase lors de la création : " + error.message);
              });
        }

        function exportToExcel() {
            let tsv = "Rang\tEquipe\tPoints\tDiff\tPour\tObs\n";
            globalRanking.forEach((t, i) => {
                const obsVal = currentData.obs && currentData.obs[t.name] ? currentData.obs[t.name] : '';
                tsv += `${i+1}\t${t.name}\t${t.pts}\t${t.diff}\t${t.pour}\t${obsVal}\n`;
            });
            navigator.clipboard.writeText(tsv).then(() => alert("Copié ! Collez directement dans Excel."));
        }

        window.onload = () => { switchContext(); updateManualFields(); };
    </script>
</body>
</html>
