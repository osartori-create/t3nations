<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N Master v36 - Détecteur de Crash</title>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("🛑 CRASH DÉTECTÉ !\n\nErreur : " + message + "\nLigne : " + lineno + "\n\nPrenez une photo de ce message et envoyez-le moi !");
            return false;
        };
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .tab-btn { color: white; opacity: 0.7; transition: all 0.2s; }
        .tab-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .tab-btn.active-tab { opacity: 1; background: #f59e0b; color: #000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .tab-btn.active-u8 { background: #2563eb !important; color: white !important; }
        .tab-btn.active-u10 { background: #ffffff !important; color: #0f172a !important; }
        .tab-btn.active-u12 { background: #dc2626 !important; color: white !important; }
        .active-poule-tab { background: #1e293b !important; color: #fff !important; }
        .excel-table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #cbd5e1; padding: 6px 4px; }
        .excel-header { background-color: #f1f5f9; font-weight: 900; text-transform: uppercase; font-size: 10px;}
        .excel-yellow { background-color: #fef08a; font-weight: 900; }
        .excel-blue { background-color: #e0f2fe; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen" onload="initApp()">

<header class="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 border-amber-500 sticky top-0 z-50">
    <div class="flex items-center gap-6">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">T3N <span class="text-amber-500 text-3xl">MASTER</span></h1>
        <input type="number" id="config-year" value="2026" onchange="broadcastSettings()" class="bg-transparent border-none text-xs font-bold text-slate-400 w-16 focus:ring-0">
        <nav class="flex gap-1 bg-white/5 p-1 rounded-xl">
            <button onclick="showTab('IMPORT')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase active-tab" id="tab-IMPORT">Import</button>
            <button onclick="showTab('U6')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U6">U6</button>
            <button onclick="showTab('U8')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U8">U8</button>
            <button onclick="showTab('U10')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U10">U10</button>
            <button onclick="showTab('U12')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase" id="tab-U12">U12</button>
            <button onclick="showTab('TROPHEE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase ml-4 text-amber-300" id="tab-TROPHEE">🏆 Trophée</button>
            <button onclick="showTab('MAINTENANCE')" class="tab-btn px-4 py-2 rounded-lg font-black text-[10px] uppercase ml-1 text-red-400" id="tab-MAINTENANCE">Purges</button>
        </nav>
    </div>
</header>

<main class="p-6 max-w-[1900px] mx-auto">
    <section id="content-IMPORT" class="tab-content space-y-6">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
            <h2 class="text-xl font-black uppercase mb-4 italic">Importation Sportive</h2>
            <textarea id="csv-input" rows="10" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-mono text-xs outline-none" placeholder="Nom Club | U6 | U8 | U10 | U12"></textarea>
            <button onclick="processMasterImport()" class="w-full mt-4 bg-slate-900 text-white p-4 rounded-2xl font-black uppercase hover:bg-slate-800 shadow-lg">Valider la base clubs</button>
        </div>
        <div id="master-table-container" class="bg-white p-6 rounded-[2.5rem] border border-slate-200 hidden">
            <table class="w-full text-left text-sm"><tbody id="master-tbody" class="divide-y divide-slate-100"></tbody></table>
        </div>
    </section>

    <section id="content-CAT" class="tab-content hidden">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm sticky top-24">
                    <h2 class="text-4xl font-black uppercase" id="active-cat-title">...</h2>
                    <p class="text-[10px] font-black opacity-40 uppercase mb-4"><span id="active-cat-count">0</span> équipes détectées</p>
                    
                    <div id="architect-container">
                        <button onclick="applyManualPlan(4)" class="w-full bg-indigo-50 text-indigo-700 font-black uppercase py-3 rounded-lg mb-2">Générer Poules de 4</button>
                        <button onclick="applyManualPlan(5)" class="w-full bg-indigo-50 text-indigo-700 font-black uppercase py-3 rounded-lg mb-2">Générer Poules de 5</button>
                    </div>
                    
                    <hr class="my-4 border-slate-100">
                    <h3 class="text-[10px] font-black uppercase opacity-40 mb-3 tracking-widest">📦 Réserve <span id="reserve-count" class="bg-slate-200 text-slate-800 px-2 rounded-full">0</span></h3>
                    <div id="reserve-zone" ondragover="allowDrop(event)" ondrop="dropToReserve(event)" class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl p-4 min-h-[150px] flex flex-col gap-2"></div>
                </div>
            </div>

            <div class="xl:col-span-9 space-y-4">
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                    <nav class="flex gap-2">
                        <button onclick="switchCatPhase('PHASE1')" id="tab-phase1" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg active-tab">Phase 1</button>
                        <button onclick="switchCatPhase('PHASE2')" id="tab-phase2" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-slate-100 text-slate-500">Phase 2</button>
                    </nav>
                </div>

                <div id="validation-zone" class="hidden bg-amber-100 border border-amber-300 p-6 rounded-[2rem] flex justify-between items-center">
                    <p class="font-black text-amber-800 uppercase text-xs">Vérifiez les poules. Validez pour débloquer les scores.</p>
                    <button onclick="validateFormat()" class="bg-amber-500 text-black px-8 py-3 rounded-xl font-black uppercase shadow-md">Valider</button>
                </div>

                <div id="poule-tabs" class="hidden flex gap-2 overflow-x-auto bg-slate-200 p-2 rounded-xl"></div>
                <div id="match-board" class="w-full"></div>
            </div>
        </div>
    </section>

    <section id="content-TROPHEE" class="tab-content hidden"><div class="p-8 text-center font-black">Trophée (Caché pour diagnostic)</div></section>
    <section id="content-MAINTENANCE" class="tab-content hidden"><div class="p-8 text-center"><button onclick="purgeLocal()" class="bg-red-600 text-white p-4 rounded font-black">💣 RESET LOCAL</button></div></section>
</main>

<script>
    var STORAGE_KEY = 't3n_master_v36_diag';
    var appState = { masterData: [], activeCat: 'U10', currentPhase: 'PHASE1', activePouleTab: 'A', cats: { 'U6': initCatState(), 'U8': initCatState(), 'U10': initCatState(), 'U12': initCatState() } };
    
    function initCatState() { return { phase1: { poules: [], reserve: [], validated: false }, phase2: { poules: [], reserve: [], validated: false } }; }
    function getActivePhase() { return appState.cats[appState.activeCat][appState.currentPhase.toLowerCase()]; }

    function initApp() {
        try {
            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { appState = JSON.parse(saved); }
            if (appState.masterData && appState.masterData.length > 0) renderMasterTable();
            showTab(appState.activeCat || 'IMPORT');
        } catch (e) {
            alert("Erreur critique au démarrage : " + e.message);
        }
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); }

    function showTab(id) {
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active-tab', 'active-u8', 'active-u10', 'active-u12'); });
        var btn = document.getElementById('tab-' + id);
        if(btn) btn.classList.add('active-tab');
        
        document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.add('hidden'); });
        document.getElementById('content-' + (['IMPORT', 'MAINTENANCE', 'TROPHEE'].includes(id) ? id : 'CAT')).classList.remove('hidden');
        
        if (!['IMPORT', 'MAINTENANCE', 'TROPHEE'].includes(id)) {
            appState.activeCat = id;
            document.getElementById('active-cat-title').innerText = id;
            initCategoryUI();
        }
        saveState();
    }

    function processMasterImport() {
        try {
            var raw = document.getElementById('csv-input').value;
            var lines = raw.split('\n');
            appState.masterData = [];
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if(!line || line.toLowerCase().includes('nom')) continue;
                
                // On gère les tabulations Excel ou les espaces multiples
                var p = line.split(/\t|;/);
                // Si la copie transforme les tabulations en espaces, on tente un fallback
                if(p.length < 5) p = line.split(/\s{2,}/); 
                
                if(p.length >= 5) {
                    appState.masterData.push({ 
                        id: 'c'+i, 
                        name: p[0].trim(), 
                        foreign: /zug|frankfurt|riedberg|heidelberg|neuenheim/i.test(p[0]), 
                        u6: parseInt(p[1]) || 0, 
                        u8: parseInt(p[2]) || 0, 
                        u10: parseInt(p[3]) || 0, 
                        u12: parseInt(p[4]) || 0 
                    });
                }
            }
            alert("✅ Import réussi : " + appState.masterData.length + " clubs lus.");
            saveState(); renderMasterTable();
        } catch (e) {
            alert("❌ Erreur pendant l'importation. Le format du texte copié pose problème : " + e.message);
        }
    }

    function renderMasterTable() {
        if(!appState.masterData) return;
        var html = appState.masterData.map(function(c){
            return '<tr><td class="p-3 font-bold uppercase text-xs">'+c.name+'</td><td class="p-3 text-center">'+c.u6+'</td><td class="p-3 text-center">'+c.u8+'</td><td class="p-3 text-center">'+c.u10+'</td><td class="p-3 text-center">'+c.u12+'</td></tr>';
        }).join('');
        document.getElementById('master-tbody').innerHTML = html;
        document.getElementById('master-table-container').classList.remove('hidden');
    }

    function initCategoryUI() {
        var phase1 = appState.cats[appState.activeCat].phase1;
        if(appState.currentPhase === 'PHASE1' && phase1.poules.length === 0) {
            phase1.teams = [];
            appState.masterData.forEach(function(c){
                var limit = c[appState.activeCat.toLowerCase()];
                for(var i=1; i<=limit; i++) {
                    phase1.teams.push({ id: c.id+'_'+i, club: c.name, level: i, name: c.name + ' ' + i, foreign: c.foreign, isDummy: false });
                }
            });
        }
        var total = phase1.teams ? phase1.teams.length : 0;
        document.getElementById('active-cat-count').innerText = total;
        renderBoard(); renderReserve();
    }

    function applyManualPlan(size) {
        try {
            var phase = getActivePhase();
            phase.poules = []; phase.reserve = [];
            var teams = phase.teams && phase.teams.length ? phase.teams.slice() : [];
            
            var nb = Math.floor(teams.length / size);
            for(var i=0; i<nb; i++) {
                phase.poules.push({ letter: String.fromCharCode(65+i), target: size, teams: teams.splice(0, size), scores: {}, adjustments: {} });
            }
            phase.reserve = teams;
            phase.validated = false;
            saveState(); renderBoard(); renderReserve();
        } catch (e) {
            alert("Erreur lors de la création des poules : " + e.message);
        }
    }

    function renderBoard() {
        var phase = getActivePhase();
        var board = document.getElementById('match-board');
        if(!phase.poules || phase.poules.length === 0) { board.innerHTML = ''; document.getElementById('validation-zone').classList.add('hidden'); return; }

        if(!phase.validated) {
            document.getElementById('validation-zone').classList.remove('hidden');
            board.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4';
            board.innerHTML = phase.poules.map(function(p, i){
                return '<div class="bg-white p-4 rounded-xl border-2" ondragover="allowDrop(event)" ondrop="dropToPoule(event, '+i+')"><h3 class="font-black mb-2">Poule '+p.letter+'</h3>' +
                    '<div class="space-y-1 min-h-[50px]">' + p.teams.map(function(t, ti){
                        return '<div draggable="true" ondragstart="dragTeam(event, '+i+', '+ti+')" class="p-2 bg-slate-50 border rounded text-xs font-bold cursor-move">'+(t?t.name:'Erreur')+'</div>';
                    }).join('') + '</div></div>';
            }).join('');
        } else {
            document.getElementById('validation-zone').classList.add('hidden');
            board.innerHTML = '<div class="bg-green-100 text-green-800 p-4 rounded-xl font-black">Poules validées. (Mode diagnostic : Affichage simplifié).</div>';
        }
    }

    function renderReserve() {
        var phase = getActivePhase();
        document.getElementById('reserve-count').innerText = phase.reserve ? phase.reserve.length : 0;
        document.getElementById('reserve-zone').innerHTML = (phase.reserve || []).map(function(t, i){
            return '<div draggable="true" ondragstart="dragFromReserve(event, '+i+')" class="p-2 bg-white border rounded text-xs font-bold cursor-move">'+(t?t.name:'Erreur')+'</div>';
        }).join('') || '<div class="opacity-20 text-[10px]">Vide</div>';
    }

    function validateFormat() { getActivePhase().validated = true; saveState(); renderBoard(); }
    function switchCatPhase(p) { appState.currentPhase = p; renderBoard(); saveState(); }
    function purgeLocal() { localStorage.clear(); location.reload(); }
    
    function allowDrop(e) { e.preventDefault(); }
    function dragTeam(e, pIdx, tIdx) { e.dataTransfer.setData("text", JSON.stringify({ src: 'poule', pIdx:pIdx, tIdx:tIdx })); }
    function dragFromReserve(e, tIdx) { e.dataTransfer.setData("text", JSON.stringify({ src: 'reserve', tIdx:tIdx })); }
    function dropToPoule(e, targetPIdx) { e.preventDefault(); try { var d = JSON.parse(e.dataTransfer.getData("text")); var phase = getActivePhase(); var team = d.src === 'poule' ? phase.poules[d.pIdx].teams.splice(d.tIdx, 1)[0] : phase.reserve.splice(d.tIdx, 1)[0]; if (team) { phase.poules[targetPIdx].teams.push(team); saveState(); renderBoard(); renderReserve(); } } catch(err){} }
    function dropToReserve(e) { e.preventDefault(); try { var d = JSON.parse(e.dataTransfer.getData("text")); if (d.src === 'poule') { getActivePhase().reserve.push(getActivePhase().poules[d.pIdx].teams.splice(d.tIdx, 1)[0]); saveState(); renderBoard(); renderReserve(); } } catch(err){} }
</script>
</body>
</html>
