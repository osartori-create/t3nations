<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>T3N 2026 - Master Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <header class="bg-slate-800 text-white p-6 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-amber-500">T3N 2026 <span class="text-white">Master</span></h1>
            <p class="text-xs opacity-60 font-bold uppercase tracking-widest">Pilotage Table de Marque - Geekom Station</p>
        </div>
        <div class="flex gap-4">
            <button onclick="exportToCSV()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-bold border border-white/20 transition-all">Exporter Secours (CSV)</button>
            <button onclick="pushToFirebase()" class="bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-lg text-slate-900 font-black uppercase shadow-lg transition-all">Pousser aux Terrains</button>
        </div>
    </header>

    <main class="p-8 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-black uppercase mb-4 flex items-center gap-2">
                    <span class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center text-sm">01</span>
                    Configuration Poule
                </h2>
                <div class="space-y-4">
                    <label class="block text-sm font-bold opacity-50 uppercase">Taille de la poule</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="selectSize(3)" class="btn-size p-3 border-2 rounded-xl font-black" id="btn-3">3</button>
                        <button onclick="selectSize(4)" class="btn-size p-3 border-2 rounded-xl font-black" id="btn-4">4</button>
                        <button onclick="selectSize(5)" class="btn-size p-3 border-2 rounded-xl font-black" id="btn-5">5</button>
                        <button onclick="selectSize(6)" class="btn-size p-3 border-2 rounded-xl font-black" id="btn-6">6</button>
                    </div>
                    
                    <div id="team-inputs" class="space-y-2 mt-6">
                        </div>
                </div>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-xl font-black uppercase">Planning & Routage Terrains</h2>
                    <span id="match-count" class="text-xs font-black bg-slate-200 px-2 py-1 rounded-full uppercase">0 Matchs</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                            <tr>
                                <th class="px-6 py-4">Ordre</th>
                                <th class="px-6 py-4">Terrain Affecté</th>
                                <th class="px-6 py-4 text-center">Match</th>
                                <th class="px-6 py-4 text-center">Arbitre</th>
                            </tr>
                        </thead>
                        <tbody id="match-list" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const matrices = {
            3: [{a:1, b:2, arb:3}, {a:2, b:3, arb:1}, {a:1, b:3, arb:2}],
            4: [{a:1, b:2, arb:4}, {a:3, b:4, arb:1}, {a:1, b:3, arb:2}, {a:2, b:4, arb:3}, {a:1, b:4, arb:2}, {a:2, b:3, arb:1}],
            5: [{a:2, b:5, arb:1}, {a:3, b:4, arb:1}, {a:1, b:5, arb:2}, {a:2, b:3, arb:4}, {a:1, b:4, arb:5}, {a:3, b:5, arb:2}, {a:1, b:3, arb:4}, {a:2, b:4, arb:5}, {a:4, b:5, arb:1}, {a:1, b:2, arb:3}]
            // Ajouter matrice 6 ici
        };

        let currentSize = 5;

        function selectSize(n) {
            currentSize = n;
            document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('border-amber-500', 'bg-amber-50'));
            document.getElementById(`btn-${n}`).classList.add('border-amber-500', 'bg-amber-50');
            renderInputs();
            generateMatches();
        }

        function renderInputs() {
            const container = document.getElementById('team-inputs');
            container.innerHTML = "";
            for(let i=1; i<=currentSize; i++) {
                container.innerHTML += `
                    <div class="flex items-center gap-3">
                        <span class="w-6 text-xs font-black opacity-30">${i}</span>
                        <input type="text" placeholder="Equipe ${i}" class="team-name flex-1 bg-slate-50 border border-slate-200 p-2 rounded-lg font-bold text-sm focus:ring-2 focus:ring-amber-500 outline-none" oninput="generateMatches()">
                    </div>`;
            }
        }

        function generateMatches() {
            const names = Array.from(document.querySelectorAll('.team-name')).map((inp, idx) => inp.value || `Equipe ${idx+1}`);
            const list = document.getElementById('match-list');
            list.innerHTML = "";
            
            matrices[currentSize].forEach((m, idx) => {
                list.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-black text-slate-300">#${idx+1}</td>
                        <td class="px-6 py-4">
                            <select class="bg-slate-100 border-none rounded-lg p-2 text-xs font-black uppercase tracking-tight">
                                <option>Terrain A</option><option>Terrain B</option><option>Terrain C</option><option>T6 & T7</option>
                            </select>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-4">
                                <span class="font-bold">${names[m.a-1]}</span>
                                <span class="text-[10px] bg-slate-800 text-white px-2 py-0.5 rounded italic">VS</span>
                                <span class="font-bold">${names[m.b-1]}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="text-xs font-black text-orange-600 bg-orange-50 px-3 py-1 rounded-full uppercase">Arb: ${names[m.arb-1]}</span>
                        </td>
                    </tr>`;
            });
            document.getElementById('match-count').innerText = `${matrices[currentSize].length} Matchs`;
        }

        // Initialisation
        selectSize(5);
    </script>
</body>
</html>
