<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3N 2026 - Live Parents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-orange-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <h1 class="text-xl font-black uppercase italic">T3N 2026 - LIVE</h1>
        <div class="mt-4 space-y-2">
            <select id="cat" onchange="render()" class="w-full bg-orange-700 p-2 rounded-lg font-bold border-none text-white">
                <option value="U8">Catégorie U8</option><option value="U10" selected>Catégorie U10</option><option value="U12">Catégorie U12</option>
            </select>
            <input type="text" id="search" oninput="render()" placeholder="Chercher votre club..." class="w-full p-2 rounded-lg text-slate-900 border-none">
        </div>
    </header>

    <main id="list" class="p-4 space-y-4"></main>

    <script>
        const firebaseConfig = { databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let data = {};

        db.ref('t3n/matin').on('value', snap => { data = snap.val() || {}; render(); });

        function render() {
            const cat = document.getElementById('cat').value;
            const s = document.getElementById('search').value.toLowerCase();
            const cont = document.getElementById('list');
            cont.innerHTML = "";
            
            if(!data[cat]) return;

            (data[cat].matches || []).forEach(m => {
                if(s && !m.t1.toLowerCase().includes(s) && !m.t2.toLowerCase().includes(s)) return;
                const done = m.status === 'finished';
                cont.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border ${done ? 'opacity-50 border-slate-200' : 'border-orange-200 ring-2 ring-orange-100'}">
                        <div class="flex justify-between text-[10px] font-black opacity-30 uppercase mb-2">
                            <span>${m.terrain}</span>
                            <span>${done ? 'Terminé' : 'En Direct'}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="font-bold w-1/3">${m.t1}</span>
                            <span class="font-black text-2xl text-orange-600 w-1/3 text-center">${m.s1} - ${m.s2}</span>
                            <span class="font-bold w-1/3 text-right">${m.t2}</span>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
