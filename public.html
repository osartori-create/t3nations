<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Résultats Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --sat-bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.85); --accent: #f59e0b; }
        body { -webkit-tap-highlight-color: transparent; background-color: var(--sat-bg); color: #f8fafc; padding-bottom: 80px; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 2px solid var(--accent); z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #64748b; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.75rem 0; width: 25%; }
        .nav-item.active { color: var(--accent); transform: translateY(-4px); font-weight: 900;}
        .nav-indicator { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0; margin-top: 2px; transition: opacity 0.3s; }
        .nav-item.active .nav-indicator { opacity: 1; }
        .match-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-left: 4px solid var(--accent); }
        .form-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin: 0 1px; }
        .bg-win { background-color: #10b981; } .bg-draw { background-color: #94a3b8; } .bg-loss { background-color: #ef4444; }
        .hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen" onload="initApp()">

    <header class="glass-panel sticky top-0 z-40 px-4 py-3 shadow-lg flex flex-col gap-3" style="border-bottom: 3px solid var(--accent);">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="logo-club" class="h-10 w-auto hidden rounded shadow-sm">
                <div>
                    <h1 id="tournoi-name" class="text-xl sm:text-2xl font-black italic uppercase tracking-tighter text-white drop-shadow-md">CHARGEMENT...</h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">En direct</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="phase-nav" class="flex bg-slate-900 rounded-full p-1 border border-slate-700 shadow-inner">
                    <button onclick="setPhase('PHASE1')" id="tab-PHASE1" class="px-3 py-1 rounded-full text-[10px] font-black uppercase transition-colors text-black shadow-sm" style="background-color: var(--accent);">Matin</button>
                    <button onclick="setPhase('PHASE2')" id="tab-PHASE2" class="px-3 py-1 rounded-full text-[10px] font-black uppercase transition-colors text-slate-400 hover:text-white">A-Midi</button>
                </div>
                <img id="logo-year" class="h-10 w-auto hidden rounded shadow-sm">
            </div>
        </div>
        <div id="poule-nav-container" class="max-w-7xl mx-auto w-full hidden">
            <div id="poule-nav" class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar w-full snap-x"></div>
        </div>
    </header>

    <div id="error-screen" class="hidden flex flex-col items-center justify-center py-20 text-center px-4">
        <span class="text-6xl mb-4">🔗</span>
        <h2 class="text-xl font-black uppercase text-red-500">Lien Invalide</h2>
        <p class="text-xs text-slate-400 mt-2">Veuillez scanner le QR Code officiel du tournoi.</p>
    </div>

    <main class="p-4 max-w-7xl mx-auto space-y-6" id="poules-container"></main>
    <main class="p-4 max-w-7xl mx-auto space-y-6 hidden" id="trophy-container"></main>

    <nav class="bottom-nav flex shadow-2xl" id="main-nav">
        <button onclick="setMainTab('U8')" id="tab-U8" class="nav-item active"><span class="text-lg font-black italic">U8</span><div class="nav-indicator"></div></button>
        <button onclick="setMainTab('U10')" id="tab-U10" class="nav-item"><span class="text-lg font-black italic">U10</span><div class="nav-indicator"></div></button>
        <button onclick="setMainTab('U12')" id="tab-U12" class="nav-item"><span class="text-lg font-black italic">U12</span><div class="nav-indicator"></div></button>
        <button onclick="setMainTab('TROPHEE')" id="tab-TROPHEE" class="nav-item relative"><span class="text-xl">🏆</span><span class="text-[8px] font-black uppercase tracking-widest mt-1">Palmarès</span><div class="nav-indicator"></div></button>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI",
        authDomain: "t3nations.firebaseapp.com",
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "t3nations"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const tournoiId = urlParams.get('id');

    let activeMain = 'U8';
    let localPhase = 'PHASE1';
    let activePoule = null; 
    let currentMatchesData = {};
    let currentStandingsData = {};

    let matchesRef = null;
    let standingsRef = null;

    function initApp() {
        if(!tournoiId) {
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            return;
        }

        // Récupération du Branding
        db.ref(`t3n/${tournoiId}/branding`).on('value', snap => {
            if(snap.exists()) {
                let b = snap.val();
                document.documentElement.style.setProperty('--accent', b.color || '#f59e0b');
                document.getElementById('tournoi-name').innerText = b.name || tournoiId;
                if(b.logoClub) { document.getElementById('logo-club').src = b.logoClub; document.getElementById('logo-club').classList.remove('hidden'); }
                if(b.logoYear) { document.getElementById('logo-year').src = b.logoYear; document.getElementById('logo-year').classList.remove('hidden'); }
                
                // Mettre à jour la couleur du bouton phase actif
                document.getElementById(`tab-${localPhase}`).style.backgroundColor = 'var(--accent)';
            } else {
                document.getElementById('tournoi-name').innerText = tournoiId;
            }
        });

        setMainTab(activeMain);
    }

    function setMainTab(tab) {
        activeMain = tab; activePoule = null; 
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');

        if (tab === 'TROPHEE') {
            document.getElementById('phase-nav').classList.add('opacity-0', 'pointer-events-none'); 
            document.getElementById('poule-nav-container').classList.add('hidden');
            document.getElementById('poules-container').classList.add('hidden'); 
            document.getElementById('trophy-container').classList.remove('hidden');
            loadTrophy();
        } else {
            document.getElementById('phase-nav').classList.remove('opacity-0', 'pointer-events-none'); 
            document.getElementById('poule-nav-container').classList.remove('hidden');
            document.getElementById('trophy-container').classList.add('hidden'); 
            document.getElementById('poules-container').classList.remove('hidden');
            loadData();
        }
    }

    function setPhase(phase) {
        localPhase = phase; activePoule = null;
        document.getElementById('tab-PHASE1').style.backgroundColor = phase === 'PHASE1' ? 'var(--accent)' : 'transparent';
        document.getElementById('tab-PHASE1').className = `px-3 py-1 rounded-full text-[10px] font-black uppercase transition-colors ${phase==='PHASE1'?'text-black shadow-sm':'text-slate-400 hover:text-white'}`;
        document.getElementById('tab-PHASE2').style.backgroundColor = phase === 'PHASE2' ? 'var(--accent)' : 'transparent';
        document.getElementById('tab-PHASE2').className = `px-3 py-1 rounded-full text-[10px] font-black uppercase transition-colors ${phase==='PHASE2'?'text-black shadow-sm':'text-slate-400 hover:text-white'}`;
        loadData();
    }

    function loadData() {
        const pathMatches = `t3n/${tournoiId}/${activeMain}_${localPhase}/matches`;
        if (matchesRef) matchesRef.off(); matchesRef = db.ref(pathMatches);

        const pathStandings = `t3n/${tournoiId}/${activeMain}_${localPhase}/standings`;
        if (standingsRef) standingsRef.off(); standingsRef = db.ref(pathStandings);
        
        document.getElementById('poules-container').innerHTML = `<div class="flex justify-center py-20 opacity-50"><div class="w-8 h-8 border-4 border-t-transparent rounded-full animate-spin" style="border-color: var(--accent);"></div></div>`;
        document.getElementById('poule-nav').innerHTML = ''; 

        matchesRef.on('value', snap => {
            if (!snap.exists()) { 
                document.getElementById('poule-nav-container').classList.add('hidden');
                document.getElementById('poules-container').innerHTML = `<div class="glass-panel p-10 rounded-[2rem] text-center text-slate-400 mt-10"><p class="font-black text-lg uppercase tracking-widest">Aucun match</p></div>`; 
                return; 
            }
            document.getElementById('poule-nav-container').classList.remove('hidden');
            let matchesByPoule = {}; 
            snap.forEach(child => { 
                let m = child.val(); 
                if (!matchesByPoule[m.poule]) matchesByPoule[m.poule] = []; 
                matchesByPoule[m.poule].push(m); 
            });
            currentMatchesData = matchesByPoule;
            let pouleKeys = Object.keys(currentMatchesData).sort();
            if(!activePoule || !pouleKeys.includes(activePoule)) activePoule = pouleKeys[0];
            buildPouleNav(pouleKeys);
            renderActivePoule();
        });

        standingsRef.on('value', snap => {
            if (snap.exists()) { currentStandingsData = snap.val(); renderActivePoule(); }
        });
    }

    function buildPouleNav(pouleKeys) {
        let navHtml = '';
        pouleKeys.forEach(p => {
            let isActive = p === activePoule;
            navHtml += `<button onclick="switchPoule('${p}')" class="px-5 py-1.5 rounded-full font-black text-xs transition-all whitespace-nowrap snap-center shrink-0 border" style="${isActive ? 'background-color: var(--accent); color: #000; border-color: var(--accent);' : 'background-color: rgba(30,41,59,0.8); color: #94a3b8; border-color: #334155;'}">Poule ${p}</button>`;
        });
        document.getElementById('poule-nav').innerHTML = navHtml;
    }

    function switchPoule(p) {
        activePoule = p;
        buildPouleNav(Object.keys(currentMatchesData).sort());
        renderActivePoule();
    }

    function renderActivePoule() {
        if (!activePoule || !currentMatchesData[activePoule]) return;
        let pLetter = activePoule;
        let matches = currentMatchesData[pLetter]; matches.sort((a, b) => a.ordre - b.ordre);
        let formsObj = {}; let fallbackTeamsObj = {};
        
        matches.forEach(m => {
            if(!formsObj[m.t1]) formsObj[m.t1] = []; if(!formsObj[m.t2]) formsObj[m.t2] = [];
            if(!fallbackTeamsObj[m.t1]) fallbackTeamsObj[m.t1] = { name: m.t1, pts: 0, diff: 0 };
            if(!fallbackTeamsObj[m.t2]) fallbackTeamsObj[m.t2] = { name: m.t2, pts: 0, diff: 0 };
            
            let s1 = (m.s1 !== undefined && m.s1 !== '') ? parseInt(m.s1) : NaN;
            let s2 = (m.s2 !== undefined && m.s2 !== '') ? parseInt(m.s2) : NaN;
            
            if (!isNaN(s1) && !isNaN(s2)) { 
                fallbackTeamsObj[m.t1].diff += (s1 - s2); fallbackTeamsObj[m.t2].diff += (s2 - s1);
                if (s1 > s2) { fallbackTeamsObj[m.t1].pts+=3; fallbackTeamsObj[m.t2].pts+=1; formsObj[m.t1].push('W'); formsObj[m.t2].push('L'); } 
                else if (s1 < s2) { fallbackTeamsObj[m.t1].pts+=1; fallbackTeamsObj[m.t2].pts+=3; formsObj[m.t1].push('L'); formsObj[m.t2].push('W'); } 
                else { fallbackTeamsObj[m.t1].pts+=2; fallbackTeamsObj[m.t2].pts+=2; formsObj[m.t1].push('D'); formsObj[m.t2].push('D'); }
            }
        });

        let ranking = [];
        if (currentStandingsData && currentStandingsData[pLetter]) {
            ranking = JSON.parse(currentStandingsData[pLetter]);
            ranking.forEach(r => { r.form = formsObj[r.name] || []; });
        } else {
            ranking = Object.values(fallbackTeamsObj).sort((a, b) => b.pts - a.pts || b.diff - a.diff);
            ranking.forEach(r => { r.form = formsObj[r.name] || []; });
        }
        
        let classRows = ranking.map((r, idx) => {
            let isGhost = r.isDummy !== undefined ? r.isDummy : /^(meilleur|\d+(er|ème)|repêché)/i.test(r.name);
            return `<div class="flex items-center justify-between py-2 border-b border-slate-700/30 ${isGhost?'opacity-40':''}">
                <div class="w-6 text-center text-xs font-black text-slate-500">${idx+1}</div>
                <div class="flex-1 font-bold text-sm truncate px-2 ${isGhost?'italic text-slate-400':'text-white'}">${r.name}</div>
                <div class="w-12 text-center text-[10px] font-bold ${r.diff>0?'text-green-400':(r.diff<0?'text-red-400':'text-slate-500')}">${r.diff>0?'+'+r.diff:r.diff}</div>
                <div class="w-10 text-center font-black text-base" style="color: var(--accent);">${r.pts}</div>
            </div>`;
        }).join('');

        let matchRows = matches.map((m) => {
            let isPlayed = (m.s1 !== undefined && m.s1 !== '') && (m.s2 !== undefined && m.s2 !== '');
            let isGhost = /^(meilleur|\d+(er|ème)|repêché)/i.test(m.t1);
            let scoreStr = isPlayed ? `${m.s2} - ${m.s1}` : `VS`;
            
            return `<div class="match-card rounded-xl p-3 mb-3 shadow-md flex flex-col relative overflow-hidden ${isGhost?'opacity-40':''}">
                <div class="absolute top-0 right-0 bg-slate-900/80 px-2 py-0.5 rounded-bl-lg text-[8px] font-black uppercase text-slate-500">${m.terrain}</div>
                <div class="flex justify-between items-center mt-2">
                    <div class="flex-1 font-bold text-xs sm:text-sm text-slate-300 truncate pr-2 text-right">${m.t2}</div>
                    <div class="bg-black/50 px-3 py-1.5 rounded-lg border ${isPlayed ? 'text-white' : 'border-slate-700/50 text-slate-600'} font-black text-lg min-w-[70px] text-center tracking-wider" style="${isPlayed?'border-color: var(--accent)':''}">${scoreStr}</div>
                    <div class="flex-1 font-bold text-xs sm:text-sm text-slate-300 truncate pl-2 text-left">${m.t1}</div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('poules-container').innerHTML = `
        <div class="animate-fade-in pb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                <div class="glass-panel p-4 rounded-3xl shadow-lg">
                    <div class="flex text-[9px] font-black uppercase tracking-widest text-slate-500 border-b border-slate-700 pb-2 mb-2">
                        <div class="w-6 text-center">#</div><div class="flex-1 px-2">Équipe</div><div class="w-12 text-center">Diff</div><div class="w-10 text-center">Pts</div>
                    </div>
                    ${classRows}
                </div>
                <div class="bg-slate-800/20 p-2 rounded-3xl border border-slate-700/30 max-h-[60vh] overflow-y-auto hide-scrollbar">
                    ${matchRows}
                </div>
            </div>
        </div>`;
    }

    function loadTrophy() {
        let tRef = db.ref(`t3n/${tournoiId}/trophy_data`);
        document.getElementById('trophy-container').innerHTML = `<div class="flex justify-center py-20 opacity-50"><div class="w-8 h-8 border-4 border-t-transparent rounded-full animate-spin" style="border-color: var(--accent);"></div></div>`;
        
        tRef.on('value', snap => {
            if (!snap.exists()) { 
                document.getElementById('trophy-container').innerHTML = `<div class="glass-panel p-10 rounded-[2rem] text-center text-slate-400 mt-10"><p class="font-black text-lg uppercase tracking-widest">Palmarès en attente</p></div>`; 
                return; 
            }
            try {
                let dbData = snap.val(); let isProvisional = dbData.status !== 'valide'; let sortedList = JSON.parse(dbData.payload);
                if (!sortedList || sortedList.length === 0) return;

                let badgeHtml = isProvisional 
                    ? `<div class="inline-block bg-indigo-900/50 border border-indigo-500 text-indigo-300 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest animate-pulse mb-6">⚠️ Classement Provisoire</div>`
                    : `<div class="inline-block bg-green-900/50 border border-green-500 text-green-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6">✅ Classement Définitif</div>`;
                
                let tbody = sortedList.map((c, idx) => `<div class="flex items-center justify-between p-3 border-b border-slate-700/50 hover:bg-slate-800/30">
                    <div class="w-8 font-black ${idx<3?'text-lg':'text-slate-500'}" style="${idx<3?'color: var(--accent)':''}">${idx+1}</div>
                    <div class="flex-1 font-bold text-sm text-white uppercase truncate px-2">${c.name}</div>
                    <div class="w-16 text-right font-black text-lg" style="color: var(--accent);">${c.pts} <span class="text-[8px] text-slate-500">pts</span></div>
                </div>`).join('');
                
                document.getElementById('trophy-container').innerHTML = `<div class="text-center w-full">${badgeHtml}</div><div class="glass-panel p-4 sm:p-8 rounded-[2.5rem] shadow-2xl mb-8"><div class="bg-slate-900/50 rounded-2xl p-2">${tbody}</div></div>`;
            } catch (err) {}
        });
    }
</script>
</body>
</html>
