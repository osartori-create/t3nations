<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T3N - Résultats Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --sat-bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.85); --accent: #f59e0b; }
        body { -webkit-tap-highlight-color: transparent; background-color: var(--sat-bg); color: #f8fafc; padding-bottom: 80px; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #64748b; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.75rem 0; width: 25%; }
        .nav-item.active { color: var(--accent); transform: translateY(-4px); }
        .nav-item.active-u8 { color: #3b82f6; } .nav-item.active-u12 { color: #ef4444; }
        .nav-indicator { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0; margin-top: 2px; transition: opacity 0.3s; }
        .nav-item.active .nav-indicator { opacity: 1; }
        
        .match-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-left: 4px solid #334155; }
        .match-u8 { border-left-color: #3b82f6; } .match-u10 { border-left-color: #f8fafc; } .match-u12 { border-left-color: #ef4444; }
        
        .form-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin: 0 1px; }
        .bg-win { background-color: #10b981; box-shadow: 0 0 5px rgba(16, 185, 129, 0.5); } 
        .bg-draw { background-color: #94a3b8; } 
        .bg-loss { background-color: #ef4444; }
        
        /* Cacher la scrollbar native pour les pilules de navigation */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* CSS du Dashboard Secret */
        #secret-dashboard { background-color: #000; color: #fff; font-family: monospace; }
        .sec-table { width: 100%; font-size: 10px; text-align: left; border-collapse: collapse; }
        .sec-table th { background: #111; padding: 4px; border-bottom: 1px solid #333; color: #888; }
        .sec-table td { padding: 4px; border-bottom: 1px solid #222; }
    </style>
</head>
<body class="font-sans min-h-screen" onload="initApp()">

    <header class="glass-panel sticky top-0 z-40 px-4 py-3 shadow-lg border-b border-slate-800 flex flex-col gap-3">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div id="logo-trigger" class="cursor-pointer select-none">
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white drop-shadow-md">T3N <span class="text-amber-500">LIVE</span></h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>
                    <span id="live-info" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Connexion...</span>
                </div>
            </div>
            
            <div id="phase-nav" class="flex bg-slate-900 rounded-full p-1 border border-slate-700 shadow-inner">
                <button onclick="setPhase('PHASE1')" id="tab-PHASE1" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-colors bg-amber-500 text-black shadow-sm">Matin</button>
                <button onclick="setPhase('PHASE2')" id="tab-PHASE2" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-colors text-slate-400 hover:text-white">A-Midi</button>
            </div>
        </div>

        <div id="poule-nav-container" class="max-w-7xl mx-auto w-full hidden">
            <div id="poule-nav" class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar w-full snap-x"></div>
        </div>
    </header>

    <main class="p-4 max-w-7xl mx-auto space-y-6" id="poules-container"></main>
    <main class="p-4 max-w-7xl mx-auto space-y-6 hidden" id="trophy-container"></main>

    <nav class="bottom-nav flex shadow-2xl">
        <button onclick="setMainTab('U8')" id="tab-U8" class="nav-item">
            <span class="text-lg font-black italic">U8</span>
            <div class="nav-indicator"></div>
        </button>
        <button onclick="setMainTab('U10')" id="tab-U10" class="nav-item">
            <span class="text-lg font-black italic">U10</span>
            <div class="nav-indicator"></div>
        </button>
        <button onclick="setMainTab('U12')" id="tab-U12" class="nav-item">
            <span class="text-lg font-black italic">U12</span>
            <div class="nav-indicator"></div>
        </button>
        <button onclick="setMainTab('TROPHEE')" id="tab-TROPHEE" class="nav-item relative">
            <span class="text-xl">🏆</span>
            <span class="text-[8px] font-black uppercase tracking-widest mt-1">Palmarès</span>
            <div class="nav-indicator"></div>
        </button>
    </nav>

    <div id="secret-dashboard" class="fixed inset-0 z-[100] hidden overflow-y-auto p-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
            <h1 class="text-xl font-black text-amber-500 tracking-widest uppercase">SUPERVISEUR T3N - <span id="sec-phase-title">PHASE 1</span></h1>
            <div class="flex gap-4 items-center">
                <button onclick="toggleSecPhase()" id="sec-btn-phase" class="bg-indigo-600 text-white text-xs px-3 py-1 font-bold rounded">Bascule A-Midi</button>
                <button onclick="closeSecretDashboard()" class="bg-red-600 text-white text-xs px-3 py-1 font-bold rounded">X Fermer</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-6" id="sec-grid"></div>
    </div>

<script>
    // --- 1. CLE FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI", 
        authDomain: "t3nations.firebaseapp.com",
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "t3nations",
        storageBucket: "t3nations.firebasestorage.app",
        messagingSenderId: "368081588642",
        appId: "1:368081588642:web:c1f2c6a3c2c9b47929a2fb"
    };

    if (!firebase.apps.length && firebaseConfig.apiKey !== "VOTRE_API_KEY") {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.apps.length ? firebase.database() : null;

    let activeMain = 'U10';
    let localPhase = 'PHASE1';
    let activePoule = null; 
    let currentMatchesData = {};

    let globalSettings = {};
    let matchesRef = null;
    let trophyRef = null;
    const pointsMap = {1:10, 2:9, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1};

    // Variables Secret Dashboard
    let clickCount = 0;
    let clickTimer = null;
    let isSecretActive = false;
    let secPhase = 'PHASE1';
    let secRef = null;

    function initApp() {
        if(!db) return;
        
        // Listener Secret
        document.getElementById('logo-trigger').addEventListener('click', () => {
            clickCount++;
            if(clickCount === 1) {
                clickTimer = setTimeout(() => { clickCount = 0; }, 600);
            } else if (clickCount === 3) {
                clearTimeout(clickTimer);
                clickCount = 0;
                launchSecretDashboard();
            }
        });

        db.ref('t3n/settings').on('value', snap => {
            if(snap.exists()) {
                globalSettings = snap.val();
                document.getElementById('live-info').innerText = `Édition ${globalSettings.activeYear}`;
                if(activeMain !== 'TROPHEE') setMainTab(activeMain);
                else setMainTab('TROPHEE');
            }
        });
    }

    function setMainTab(tab) {
        activeMain = tab;
        activePoule = null; // Reset de la poule à chaque changement de catégorie
        
        document.querySelectorAll('.nav-item').forEach(b => { 
            b.classList.remove('active', 'active-u8', 'active-u12'); 
        });
        
        let btn = document.getElementById(`tab-${tab}`);
        btn.classList.add('active');

        if (tab === 'TROPHEE') {
            document.getElementById('phase-nav').classList.add('opacity-0', 'pointer-events-none'); 
            document.getElementById('poule-nav-container').classList.add('hidden');
            document.getElementById('poules-container').classList.add('hidden'); 
            document.getElementById('trophy-container').classList.remove('hidden');
            loadTrophy();
        } else {
            if (tab === 'U8') btn.classList.add('active-u8');
            if (tab === 'U12') btn.classList.add('active-u12');
            
            document.getElementById('phase-nav').classList.remove('opacity-0', 'pointer-events-none'); 
            document.getElementById('poule-nav-container').classList.remove('hidden');
            document.getElementById('trophy-container').classList.add('hidden'); 
            document.getElementById('poules-container').classList.remove('hidden');
            loadData();
        }
    }

    function setPhase(phase) {
        localPhase = phase;
        activePoule = null;
        document.getElementById('tab-PHASE1').className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-colors ${phase==='PHASE1'?'bg-amber-500 text-black shadow-sm':'text-slate-400 hover:text-white'}`;
        document.getElementById('tab-PHASE2').className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-colors ${phase==='PHASE2'?'bg-amber-500 text-black shadow-sm':'text-slate-400 hover:text-white'}`;
        loadData();
    }

    function loadData() {
        if (!db || !globalSettings.activeYear) return;
        const year = globalSettings.activeYear; const path = `t3n/${year}/${activeMain}_${localPhase}/matches`;
        if (matchesRef) matchesRef.off(); matchesRef = db.ref(path);
        
        document.getElementById('poules-container').innerHTML = `<div class="flex flex-col items-center justify-center py-20 opacity-50"><div class="w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div><span class="text-[10px] font-black uppercase tracking-widest">Mise à jour terrain...</span></div>`;
        document.getElementById('poule-nav').innerHTML = ''; // Nettoyage de la nav

        matchesRef.on('value', snap => {
            if (!snap.exists()) { 
                document.getElementById('poule-nav-container').classList.add('hidden');
                document.getElementById('poules-container').innerHTML = `<div class="glass-panel p-10 rounded-[2rem] text-center text-slate-400 mt-10"><span class="text-4xl block mb-4 opacity-50">🏟️</span><p class="font-black text-lg uppercase tracking-widest">Aucun match</p><p class="text-[10px] uppercase opacity-60 mt-2">Le calendrier n'est pas encore dévoilé pour cette phase.</p></div>`; 
                return; 
            }
            document.getElementById('poule-nav-container').classList.remove('hidden');
            
            let matchesByPoule = {}; 
            snap.forEach(child => { 
                let m = child.val(); 
                if (!matchesByPoule[m.poule]) matchesByPoule[m.poule] = []; 
                matchesByPoule[m.poule].push(m); 
            });
            
            currentMatchesData = matchesByPoule;
            let pouleKeys = Object.keys(currentMatchesData).sort();
            if(!activePoule || !pouleKeys.includes(activePoule)) activePoule = pouleKeys[0];
            
            buildPouleNav(pouleKeys);
            renderActivePoule();
        });
    }

    // NOUVEAU : Construction de la barre de navigation
    function buildPouleNav(pouleKeys) {
        let navHtml = '';
        pouleKeys.forEach(p => {
            let isActive = p === activePoule;
            navHtml += `<button onclick="switchPoule('${p}')" class="px-5 py-1.5 rounded-full font-black text-xs transition-all whitespace-nowrap snap-center shrink-0 border ${isActive ? 'bg-amber-500 text-black border-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.3)]' : 'bg-slate-800/80 text-slate-400 border-slate-700'}">Poule ${p}</button>`;
        });
        document.getElementById('poule-nav').innerHTML = navHtml;
    }

    function switchPoule(p) {
        activePoule = p;
        let pouleKeys = Object.keys(currentMatchesData).sort();
        buildPouleNav(pouleKeys);
        renderActivePoule();
    }

    function renderActivePoule() {
        if (!activePoule || !currentMatchesData[activePoule]) return;
        
        let pLetter = activePoule;
        let catColorClass = activeMain === 'U8' ? 'match-u8' : (activeMain === 'U12' ? 'match-u12' : 'match-u10');
        let textAccent = activeMain === 'U8' ? 'text-blue-400' : (activeMain === 'U12' ? 'text-red-400' : 'text-amber-400');

        let matches = currentMatchesData[pLetter]; 
        matches.sort((a, b) => a.ordre - b.ordre);
        let teamsObj = {};
        
        matches.forEach(m => {
            if(!teamsObj[m.t1]) teamsObj[m.t1] = { name: m.t1, pts: 0, diff: 0, played: 0, form: [] };
            if(!teamsObj[m.t2]) teamsObj[m.t2] = { name: m.t2, pts: 0, diff: 0, played: 0, form: [] };
            let s1 = parseInt(m.s1), s2 = parseInt(m.s2);
            if (s1 > 0 || s2 > 0 || m.locked) { 
                teamsObj[m.t1].played++; teamsObj[m.t2].played++; teamsObj[m.t1].diff += (s1 - s2); teamsObj[m.t2].diff += (s2 - s1);
                if (s1 > s2) { teamsObj[m.t1].pts+=3; teamsObj[m.t2].pts+=1; teamsObj[m.t1].form.push('W'); teamsObj[m.t2].form.push('L'); } 
                else if (s1 < s2) { teamsObj[m.t1].pts+=1; teamsObj[m.t2].pts+=3; teamsObj[m.t1].form.push('L'); teamsObj[m.t2].form.push('W'); } 
                else { teamsObj[m.t1].pts+=2; teamsObj[m.t2].pts+=2; teamsObj[m.t1].form.push('D'); teamsObj[m.t2].form.push('D'); }
            }
        });

        let ranking = Object.values(teamsObj).sort((a, b) => b.pts - a.pts || b.diff - a.diff);
        
        // RENDU CLASSEMENT
        let classRows = ranking.map((r, idx) => {
            let formHtml = r.form.slice(-3).map(f => `<span class="form-dot ${f==='W'?'bg-win':(f==='L'?'bg-loss':'bg-draw')}"></span>`).join('');
            let isGhost = r.name.toLowerCase().includes('meilleur') || r.name.toLowerCase().includes(' des ');
            return `<div class="flex items-center justify-between py-2 border-b border-slate-700/30 ${isGhost?'opacity-40':''}">
                <div class="w-6 text-center text-xs font-black text-slate-500">${idx+1}</div>
                <div class="flex-1 font-bold text-sm truncate px-2 ${isGhost?'italic text-slate-400':'text-white'}">${r.name}</div>
                <div class="w-12 text-center text-[10px] font-bold ${r.diff>0?'text-green-400':(r.diff<0?'text-red-400':'text-slate-500')}">${r.diff>0?'+'+r.diff:r.diff}</div>
                <div class="w-10 text-center font-black ${textAccent} text-base">${r.pts}</div>
            </div>`;
        }).join('');

        // RENDU MATCHS (CARTES)
        let matchRows = matches.map((m) => {
            let isPlayed = m.s1 > 0 || m.s2 > 0 || m.locked;
            let isGhost = m.t1.toLowerCase().includes('meilleur') || m.t1.toLowerCase().includes(' des ');
            
            return `<div class="match-card ${catColorClass} rounded-xl p-3 mb-3 shadow-md flex flex-col relative overflow-hidden ${isGhost?'opacity-40':''}">
                <div class="absolute top-0 right-0 bg-slate-900/80 px-2 py-0.5 rounded-bl-lg text-[8px] font-black uppercase text-slate-500">${m.terrain}</div>
                <div class="flex justify-between items-center mt-2">
                    <div class="flex-1 font-bold text-xs sm:text-sm text-slate-300 truncate pr-2 text-right">${m.t2}</div>
                    <div class="bg-black/50 px-3 py-1.5 rounded-lg border ${isPlayed ? 'border-amber-500/50 text-white' : 'border-slate-700/50 text-slate-600'} font-black text-lg min-w-[70px] text-center tracking-wider">${m.s2} - ${m.s1}</div>
                    <div class="flex-1 font-bold text-xs sm:text-sm text-slate-300 truncate pl-2 text-left">${m.t1}</div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('poules-container').innerHTML = `
        <div class="animate-fade-in pb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                <div class="glass-panel p-4 rounded-3xl shadow-lg">
                    <div class="flex text-[9px] font-black uppercase tracking-widest text-slate-500 border-b border-slate-700 pb-2 mb-2">
                        <div class="w-6 text-center">#</div><div class="flex-1 px-2">Équipe</div><div class="w-12 text-center">Diff</div><div class="w-10 text-center">Pts</div>
                    </div>
                    ${classRows}
                </div>
                
                <div class="bg-slate-800/20 p-2 rounded-3xl border border-slate-700/30 max-h-[60vh] overflow-y-auto hide-scrollbar">
                    ${matchRows}
                </div>
            </div>
        </div>`;
    }

    function loadTrophy() {
        if (!db || !globalSettings.activeYear) return; const year = globalSettings.activeYear;
        if (trophyRef) trophyRef.off(); trophyRef = db.ref(`t3n/${year}/trophy`);
        
        document.getElementById('trophy-container').innerHTML = `<div class="flex flex-col items-center justify-center py-20 opacity-50"><div class="text-4xl animate-bounce mb-4">🏆</div><span class="text-[10px] font-black uppercase tracking-widest">Préparation du Palmarès...</span></div>`;
        
        trophyRef.on('value', snap => {
            if (!snap.exists()) { 
                document.getElementById('trophy-container').innerHTML = `<div class="glass-panel p-10 rounded-[2rem] text-center text-slate-400 mt-10"><span class="text-5xl block mb-4 opacity-50">🛡️</span><p class="font-black text-lg uppercase tracking-widest">Palmarès en attente</p><p class="text-[10px] uppercase opacity-60 mt-2">Le bouclier sera calculé à l'issue de la phase 2.</p></div>`; 
                return; 
            }
            
            let data = snap.val();
            let sortedList = [];
            let isProvisional = false;

            // Rétrocompatibilité et nouveau format
            if (Array.isArray(data)) {
                sortedList = data;
            } else if (data.ranking) {
                sortedList = Array.isArray(data.ranking) ? data.ranking : Object.values(data.ranking);
                isProvisional = (data.status === 'provisoire');
            }

            if (sortedList.length === 0) return;

            let badgeHtml = isProvisional 
                ? `<div class="inline-block bg-indigo-900/50 border border-indigo-500 text-indigo-300 px-4 py-1.5 rounded-full text-[9px] sm:text-[10px] font-black uppercase tracking-widest animate-pulse mb-6 shadow-[0_0_15px_rgba(99,102,241,0.3)]">⚠️ Classement Provisoire (Matchs en cours)</div>`
                : `<div class="inline-block bg-green-900/50 border border-green-500 text-green-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 shadow-[0_0_15px_rgba(34,197,94,0.3)]">✅ Classement Définitif</div>`;
            
            let pHtml = '';
            if(sortedList[1]) pHtml += `<div class="flex flex-col items-center justify-end h-40"><div class="text-center font-bold text-[10px] sm:text-xs mb-2 text-slate-300 truncate w-20 sm:w-28 uppercase">${sortedList[1].name}</div><div class="bg-slate-600 border border-slate-500 w-20 sm:w-28 h-3/4 rounded-t-2xl flex flex-col items-center pt-3 shadow-inner"><span class="text-2xl">🥈</span><span class="font-black text-sm sm:text-base mt-1 text-slate-300">${sortedList[1].pts}p</span></div></div>`;
            if(sortedList[0]) pHtml += `<div class="flex flex-col items-center justify-end h-56"><div class="text-center font-black text-xs sm:text-sm mb-2 text-amber-400 truncate w-24 sm:w-32 uppercase">${sortedList[0].name}</div><div class="bg-gradient-to-b from-amber-500 to-amber-600 border border-amber-400 w-24 sm:w-32 h-full rounded-t-2xl flex flex-col items-center pt-4 shadow-inner"><span class="text-4xl drop-shadow-lg">🏆</span><span class="font-black text-xl sm:text-2xl mt-2 text-black">${sortedList[0].pts}p</span></div></div>`;
            if(sortedList[2]) pHtml += `<div class="flex flex-col items-center justify-end h-32"><div class="text-center font-bold text-[10px] sm:text-xs mb-2 text-slate-300 truncate w-20 sm:w-28 uppercase">${sortedList[2].name}</div><div class="bg-orange-800 border border-orange-700 w-20 sm:w-28 h-2/3 rounded-t-2xl flex flex-col items-center pt-2 shadow-inner"><span class="text-xl">🥉</span><span class="font-black text-sm sm:text-base mt-1 text-orange-300">${sortedList[2].pts}p</span></div></div>`;
            
            let tbody = sortedList.map((c, idx) => `<div class="flex items-center justify-between p-3 border-b border-slate-700/50 hover:bg-slate-800/30">
                <div class="w-8 font-black ${idx<3?'text-amber-500 text-lg':'text-slate-500'}">${idx+1}</div>
                <div class="flex-1 font-bold text-sm text-white uppercase truncate px-2">${c.name}</div>
                <div class="hidden sm:flex flex-1 justify-center gap-4">
                    <span class="text-[10px] font-bold ${c.U8===999?'text-slate-700':'text-blue-400'}">U8: ${c.U8===999?'-':c.U8+'e'}</span>
                    <span class="text-[10px] font-bold ${c.U10===999?'text-slate-700':'text-slate-300'}">U10: ${c.U10===999?'-':c.U10+'e'}</span>
                    <span class="text-[10px] font-bold ${c.U12===999?'text-slate-700':'text-red-400'}">U12: ${c.U12===999?'-':c.U12+'e'}</span>
                </div>
                <div class="w-16 text-right font-black text-amber-500 text-lg">${c.pts} <span class="text-[8px] text-slate-500">pts</span></div>
            </div>`).join('');
            
            document.getElementById('trophy-container').innerHTML = `
            <div class="text-center w-full">${badgeHtml}</div>
            <div class="glass-panel p-4 sm:p-8 rounded-[2.5rem] shadow-2xl mb-8">
                <div class="flex justify-center items-end h-56 gap-2 mb-8">${pHtml}</div>
                <div class="bg-slate-900/50 rounded-2xl p-2">${tbody}</div>
            </div>`;
        });
    }

    // --- FONCTIONS DU MODE SECRET ---
    function launchSecretDashboard() {
        if (!globalSettings.activeYear) return;
        isSecretActive = true;
        document.body.style.overflow = 'hidden'; 
        document.getElementById('secret-dashboard').classList.remove('hidden');
        loadSecretData();
    }

    function closeSecretDashboard() {
        isSecretActive = false;
        document.body.style.overflow = 'auto';
        document.getElementById('secret-dashboard').classList.add('hidden');
        if(secRef) secRef.off();
    }

    function toggleSecPhase() {
        secPhase = secPhase === 'PHASE1' ? 'PHASE2' : 'PHASE1';
        document.getElementById('sec-phase-title').innerText = secPhase;
        document.getElementById('sec-btn-phase').innerText = secPhase === 'PHASE1' ? 'Bascule A-Midi' : 'Bascule Matin';
        loadSecretData();
    }

    function loadSecretData() {
        if (!isSecretActive) return;
        if (secRef) secRef.off();
        secRef = db.ref(`t3n/${globalSettings.activeYear}`);
        
        secRef.on('value', snap => {
            if(!snap.exists()) return;
            let data = snap.val();
            let html = '';
            
            ['U8', 'U10', 'U12'].forEach(cat => {
                let catData = data[`${cat}_${secPhase}`];
                let content = `<p class="text-xs text-slate-500 italic mt-4">Aucune donnée</p>`;
                
                if (catData && catData.matches) {
                    let matchesByPoule = {};
                    Object.values(catData.matches).forEach(m => {
                        if (!matchesByPoule[m.poule]) matchesByPoule[m.poule] = [];
                        matchesByPoule[m.poule].push(m);
                    });
                    
                    content = Object.keys(matchesByPoule).sort().map(pLetter => {
                        let matches = matchesByPoule[pLetter];
                        let teamsObj = {};
                        matches.forEach(m => {
                            if(!teamsObj[m.t1]) teamsObj[m.t1] = { pts: 0, diff: 0 };
                            if(!teamsObj[m.t2]) teamsObj[m.t2] = { pts: 0, diff: 0 };
                            let s1 = parseInt(m.s1), s2 = parseInt(m.s2);
                            if (s1 > 0 || s2 > 0 || m.locked) { 
                                teamsObj[m.t1].diff += (s1 - s2); teamsObj[m.t2].diff += (s2 - s1);
                                if (s1 > s2) { teamsObj[m.t1].pts+=3; teamsObj[m.t2].pts+=1; } 
                                else if (s1 < s2) { teamsObj[m.t1].pts+=1; teamsObj[m.t2].pts+=3; } 
                                else { teamsObj[m.t1].pts+=2; teamsObj[m.t2].pts+=2; }
                            }
                        });
                        let ranking = Object.keys(teamsObj).map(name => ({name: name, ...teamsObj[name]})).sort((a,b) => b.pts - a.pts || b.diff - a.diff);
                        
                        let rows = ranking.map((r,i) => `<tr><td>${i+1}</td><td class="truncate max-w-[100px] font-bold text-white">${r.name}</td><td>${r.diff>0?'+'+r.diff:r.diff}</td><td class="text-amber-400 font-bold">${r.pts}</td></tr>`).join('');
                        return `<div class="mb-4"><h3 class="text-amber-500 border-b border-amber-900 mb-1">Poule ${pLetter}</h3><table class="sec-table"><thead><tr><th class="w-4">#</th><th>Equipe</th><th class="w-8">Diff</th><th class="w-8">Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                    }).join('');
                }
                
                let color = cat === 'U8' ? 'border-blue-600' : (cat === 'U12' ? 'border-red-600' : 'border-slate-400');
                html += `<div class="bg-slate-900 border-t-4 ${color} p-4 rounded-xl shadow-2xl"><h2 class="text-2xl font-black mb-4">${cat}</h2>${content}</div>`;
            });
            
            document.getElementById('sec-grid').innerHTML = html;
        });
    }

</script>
</body>
</html>
