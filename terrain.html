<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Saisie Terrain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #f59e0b; }
        body { background-color: #0f172a; color: #f8fafc; touch-action: manipulation; }
        .score-btn { transition: transform 0.1s; }
        .score-btn:active { transform: scale(0.9); background-color: var(--accent) !important; color: #000; }
        .match-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); border-top: 4px solid var(--accent); }
    </style>
</head>
<body class="font-sans min-h-screen p-4">

    <header class="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
        <div class="flex gap-3 items-center">
            <img id="logo-club" class="h-10 w-auto hidden rounded shadow-sm">
            <div>
                <h1 id="tournoi-name" class="text-xl font-black italic text-white uppercase tracking-tighter">CHARGEMENT...</h1>
                <p id="terrain-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Terrain ?</p>
            </div>
        </div>
        <div id="auth-status" class="px-3 py-1 rounded-full bg-red-900/30 border border-red-500 text-red-500 text-[9px] font-black uppercase shadow-sm">Non sécurisé</div>
    </header>

    <div id="matches-list" class="space-y-4 max-w-lg mx-auto">
        <div class="flex flex-col items-center justify-center py-20 opacity-30">
            <div class="w-8 h-8 border-4 border-t-transparent rounded-full animate-spin mb-4" style="border-color: var(--accent);"></div>
            <p class="text-xs font-bold uppercase">Recherche des matchs...</p>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI",
        authDomain: "t3nations.firebaseapp.com",
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "t3nations"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const tournoiId = urlParams.get('id');
    const terrainNum = urlParams.get('t');
    const accessKey = urlParams.get('key');

    if(!tournoiId || !terrainNum) {
        document.getElementById('matches-list').innerHTML = "<div class='text-center text-red-500 font-bold'>Lien invalide. Vérifiez l'ID et le numéro de terrain.</div>";
    } else {
        document.getElementById('terrain-label').innerText = `TERRAIN ${terrainNum}`;
        if(accessKey) {
            const status = document.getElementById('auth-status');
            status.innerText = "Accès Sécurisé";
            status.className = "px-3 py-1 rounded-full bg-green-900/30 border border-green-500 text-green-500 text-[9px] font-black uppercase shadow-sm";
        }

        // Branding
        db.ref(`t3n/${tournoiId}/branding`).on('value', snap => {
            if(snap.exists()) {
                let b = snap.val();
                document.documentElement.style.setProperty('--accent', b.color || '#f59e0b');
                document.getElementById('tournoi-name').innerText = b.name || tournoiId;
                if(b.logoClub) { document.getElementById('logo-club').src = b.logoClub; document.getElementById('logo-club').classList.remove('hidden'); }
            } else {
                document.getElementById('tournoi-name').innerText = tournoiId;
            }
        });

        loadMatches();
    }

    function loadMatches() {
        db.ref(`t3n/${tournoiId}`).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            const container = document.getElementById('matches-list');
            container.innerHTML = "";

            let matchesFound = [];
            Object.keys(data).forEach(catPhase => {
                if(data[catPhase].matches) {
                    Object.keys(data[catPhase].matches).forEach(mId => {
                        let m = data[catPhase].matches[mId];
                        if(m.terrain === `Terrain ${terrainNum}`) {
                            matchesFound.push({ ...m, id: mId, path: `t3n/${tournoiId}/${catPhase}/matches/${mId}` });
                        }
                    });
                }
            });

            if(matchesFound.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-500 py-10 italic font-bold'>Aucun match assigné à ce terrain pour le moment.</p>";
                return;
            }

            matchesFound.sort((a,b) => a.ordre - b.ordre).forEach(m => {
                container.appendChild(createMatchCard(m));
            });
        });
    }

    function createMatchCard(m) {
        const card = document.createElement('div');
        card.className = `match-card rounded-3xl p-5 ${m.locked ? 'opacity-50 grayscale' : ''}`;
        
        card.innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black bg-slate-800 px-2 py-1 rounded uppercase" style="color: var(--accent);">${m.poule} - Match ${m.ordre}</span>
                ${m.locked ? '<span class="text-[10px] font-black text-red-500 bg-red-900/30 px-2 py-1 rounded">VERROUILLÉ</span>' : ''}
            </div>
            <div class="grid grid-cols-3 gap-4 items-center">
                <div class="text-right">
                    <p class="text-[10px] sm:text-xs font-bold text-slate-400 mb-2 truncate" style="height: 1.5rem;">${m.t2}</p>
                    <button onclick="changeScore('${m.path}', 's2', 1)" ${m.locked?'disabled':''} class="score-btn w-16 h-16 sm:w-20 sm:h-20 bg-slate-800 rounded-2xl text-2xl sm:text-3xl font-black border border-slate-700 shadow-lg">${m.s2 !== '' ? m.s2 : 0}</button>
                    <button onclick="changeScore('${m.path}', 's2', -1)" ${m.locked?'disabled':''} class="mt-3 text-[9px] text-slate-500 font-black uppercase bg-slate-800/50 px-3 py-1.5 rounded-lg active:bg-slate-700">Diminuer</button>
                </div>
                <div class="text-center font-black text-slate-600 text-xl sm:text-2xl">VS</div>
                <div class="text-left">
                    <p class="text-[10px] sm:text-xs font-bold text-slate-400 mb-2 truncate" style="height: 1.5rem;">${m.t1}</p>
                    <button onclick="changeScore('${m.path}', 's1', 1)" ${m.locked?'disabled':''} class="score-btn w-16 h-16 sm:w-20 sm:h-20 bg-slate-800 rounded-2xl text-2xl sm:text-3xl font-black border border-slate-700 shadow-lg">${m.s1 !== '' ? m.s1 : 0}</button>
                    <button onclick="changeScore('${m.path}', 's1', -1)" ${m.locked?'disabled':''} class="mt-3 text-[9px] text-slate-500 font-black uppercase bg-slate-800/50 px-3 py-1.5 rounded-lg active:bg-slate-700">Diminuer</button>
                </div>
            </div>
            <div class="mt-4 pt-3 border-t border-white/5 text-center">
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Arbitre : <span class="text-slate-300">${m.arb || 'Non assigné'}</span></p>
            </div>
        `;
        return card;
    }

    function changeScore(path, field, delta) {
        if(!accessKey) return alert("Erreur : Clé de sécurité manquante.");

        db.ref(path).once('value', snap => {
            let currentStr = snap.val()[field];
            let current = (currentStr === '' || currentStr === undefined) ? 0 : parseInt(currentStr);
            let newVal = Math.max(0, current + delta);
            
            db.ref(path).update({ 
                [field]: newVal,
                auth_token: accessKey 
            }).catch(err => {
                alert("Erreur de sécurité : Vous n'avez pas l'autorisation.");
            });
        });
    }
</script>
</body>
</html>
