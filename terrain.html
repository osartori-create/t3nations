<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Saisie Terrain Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #f59e0b; }
        body { background-color: #000000; color: #ffffff; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .score-box { background: #111; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .btn-action { transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.90); }
        .match-card { background: #111; border: 1px solid #333; border-left: 6px solid var(--accent); }
        .tab-btn { transition: all 0.2s; }
        .tab-active { background-color: var(--accent); color: #000; }
        .tab-inactive { background-color: #222; color: #666; }
    </style>
</head>
<body class="font-sans min-h-screen p-3 pb-10">

    <header class="flex justify-between items-center mb-4 pb-4 border-b border-[#333]">
        <div class="flex gap-3 items-center">
            <img id="logo-club" class="h-12 w-auto hidden rounded shadow-sm bg-white p-0.5">
            <div>
                <h1 id="tournoi-name" class="text-xl font-black italic uppercase tracking-tighter text-white">CHARGEMENT...</h1>
                <p id="terrain-label" class="text-[11px] font-black uppercase tracking-widest mt-1" style="color: var(--accent);">Terrain ?</p>
            </div>
        </div>
        <div id="auth-status" class="px-3 py-2 rounded-lg bg-red-900 border border-red-500 text-white text-[9px] font-black uppercase text-center leading-tight">
            NON<br>SÉCURISÉ
        </div>
    </header>

    <div id="phase-selector" class="flex gap-2 mb-6 hidden">
        <button id="btn-phase1" onclick="setPhase('PHASE1')" class="tab-btn tab-active flex-1 py-4 rounded-xl font-black text-sm uppercase shadow-lg">Matin</button>
        <button id="btn-phase2" onclick="setPhase('PHASE2')" class="tab-btn tab-inactive flex-1 py-4 rounded-xl font-black text-sm uppercase shadow-lg">A-Midi</button>
    </div>

    <div id="matches-list" class="space-y-5 max-w-lg mx-auto">
        <div class="flex flex-col items-center justify-center py-20 opacity-30">
            <div class="w-10 h-10 border-4 border-t-transparent rounded-full animate-spin mb-4" style="border-color: var(--accent);"></div>
            <p class="text-sm font-black uppercase tracking-widest">Synchronisation...</p>
        </div>
    </div>

<script>
    // --- Configuration Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyBJOSTZJ3--Bspwt3ld-S8Wu2D5FGdcOMI",
        authDomain: "t3nations.firebaseapp.com",
        databaseURL: "https://t3nations-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "t3nations"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Variables Globales ---
    const urlParams = new URLSearchParams(window.location.search);
    const tournoiId = urlParams.get('id');
    const activeCat = urlParams.get('cat'); 
    const terrainNum = urlParams.get('t');
    const accessKey = urlParams.get('key');
    
    let currentPhase = 'PHASE1';
    let tournoiData = null; // Stocke toutes les données reçues en direct

    // --- Initialisation ---
    if(!tournoiId || !terrainNum || !activeCat) {
        document.getElementById('matches-list').innerHTML = `
            <div class='text-center border-2 border-red-600 font-bold p-6 bg-red-900 rounded-3xl mt-10'>
                <p class="text-xl text-white mb-2">LIEN INCOMPLET</p>
                <span class='text-xs text-red-200 uppercase'>Veuillez flasher un QR Code valide depuis le poste Maître.</span>
            </div>`;
    } else {
        document.getElementById('terrain-label').innerText = `${activeCat} - TERRAIN ${terrainNum}`;
        document.getElementById('phase-selector').classList.remove('hidden');

        if(accessKey) {
            const status = document.getElementById('auth-status');
            status.innerHTML = "ACCÈS<br>SÉCURISÉ";
            status.className = "px-3 py-2 rounded-lg bg-green-800 border border-green-400 text-white text-[9px] font-black uppercase text-center leading-tight";
        }

        // Branding
        db.ref(`t3n/${tournoiId}/branding`).on('value', snap => {
            if(snap.exists()) {
                let b = snap.val();
                document.documentElement.style.setProperty('--accent', b.color || '#f59e0b');
                document.getElementById('tournoi-name').innerText = b.name || tournoiId;
                if(b.logoClub) { 
                    document.getElementById('logo-club').src = b.logoClub; 
                    document.getElementById('logo-club').classList.remove('hidden'); 
                }
            }
        });

        // Lancer l'écoute de la base de données
        loadMatches();
    }

    // --- Changement d'onglet ---
    function setPhase(phase) {
        currentPhase = phase;
        document.getElementById('btn-phase1').className = `tab-btn flex-1 py-4 rounded-xl font-black text-sm uppercase shadow-lg ${phase === 'PHASE1' ? 'tab-active' : 'tab-inactive'}`;
        document.getElementById('btn-phase2').className = `tab-btn flex-1 py-4 rounded-xl font-black text-sm uppercase shadow-lg ${phase === 'PHASE2' ? 'tab-active' : 'tab-inactive'}`;
        renderMatches();
    }

    // --- Récupération des données ---
    function loadMatches() {
        db.ref(`t3n/${tournoiId}`).on('value', snap => {
            if(!snap.exists()) return;
            tournoiData = snap.val();
            renderMatches();
        });
    }

    // --- Affichage ---
    function renderMatches() {
        if(!tournoiData) return;
        const container = document.getElementById('matches-list');
        container.innerHTML = "";

        const phaseKey = `${activeCat}_${currentPhase}`;
        let matchesFound = [];

        // Si la branche de la phase existe, on filtre les matchs du terrain
        if(tournoiData[phaseKey] && tournoiData[phaseKey].matches) {
            Object.keys(tournoiData[phaseKey].matches).forEach(mId => {
                let m = tournoiData[phaseKey].matches[mId];
                if(m.terrain === `Terrain ${terrainNum}`) {
                    matchesFound.push({ ...m, id: mId, path: `t3n/${tournoiId}/${phaseKey}/matches/${mId}` });
                }
            });
        }

        if(matchesFound.length === 0) {
            container.innerHTML = `
                <div class='text-center p-8 bg-[#111] rounded-3xl border border-[#333] mt-10'>
                    <p class='text-white font-black text-lg mb-2'>AUCUN MATCH</p>
                    <p class='text-xs text-gray-500 uppercase font-bold tracking-widest'>Le Maître n'a rien déployé pour ce terrain sur cette phase.</p>
                </div>`;
            return;
        }

        // Tri par ordre chronologique
        matchesFound.sort((a,b) => a.ordre - b.ordre).forEach(m => {
            container.appendChild(createMatchCard(m));
        });
    }

    // --- Création de la carte HTML du match ---
    function createMatchCard(m) {
        const card = document.createElement('div');
        // Opacité réduite si verrouillé par le maitre
        card.className = `match-card rounded-3xl p-5 shadow-xl ${m.locked ? 'opacity-40 grayscale pointer-events-none' : ''}`;
        
        let s1 = m.s1 !== '' && m.s1 !== undefined ? m.s1 : '-';
        let s2 = m.s2 !== '' && m.s2 !== undefined ? m.s2 : '-';

        card.innerHTML = `
            <div class="flex justify-between items-center mb-5 border-b border-[#333] pb-3">
                <span class="text-sm font-black uppercase tracking-widest" style="color: var(--accent);">Poule ${m.poule} - Match ${m.ordre}</span>
                ${m.locked ? '<span class="text-[9px] font-black text-white bg-red-600 px-2 py-1 rounded">VERROUILLÉ</span>' : ''}
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="w-[45%]">
                    <p class="text-xl font-black text-white uppercase leading-tight break-words">${m.t2}</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeScore('${m.path}', 's2', -1)" class="btn-action w-12 h-14 bg-gray-800 text-gray-400 rounded-xl font-black text-3xl flex items-center justify-center border border-[#333]">-</button>
                    <div class="score-box w-16 h-16 rounded-xl flex items-center justify-center font-black text-4xl text-white">${s2}</div>
                    <button onclick="changeScore('${m.path}', 's2', 1)" class="btn-action w-12 h-14 bg-green-900/50 text-green-400 rounded-xl font-black text-3xl flex items-center justify-center border border-green-900">+</button>
                </div>
            </div>

            <div class="w-full h-px bg-[#333] mb-6 relative">
                <span class="absolute left-1/2 -top-3 -translate-x-1/2 bg-[#111] px-3 text-xs font-black text-gray-600">VS</span>
            </div>

            <div class="flex justify-between items-center mb-4">
                <div class="w-[45%]">
                    <p class="text-xl font-black text-white uppercase leading-tight break-words">${m.t1}</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeScore('${m.path}', 's1', -1)" class="btn-action w-12 h-14 bg-gray-800 text-gray-400 rounded-xl font-black text-3xl flex items-center justify-center border border-[#333]">-</button>
                    <div class="score-box w-16 h-16 rounded-xl flex items-center justify-center font-black text-4xl text-white">${s1}</div>
                    <button onclick="changeScore('${m.path}', 's1', 1)" class="btn-action w-12 h-14 bg-green-900/50 text-green-400 rounded-xl font-black text-3xl flex items-center justify-center border border-green-900">+</button>
                </div>
            </div>

            <div class="mt-5 pt-3 border-t border-[#222] flex justify-between items-center">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="text-xl">哨</span> Arbitre : <span class="text-gray-300 font-black">${m.arb || 'Non assigné'}</span>
                </p>
            </div>
        `;
        return card;
    }

    // --- Modification des scores ---
    function changeScore(path, field, delta) {
        if(!accessKey) return alert("Interdit : Il vous manque la clé de sécurité pour modifier le score.");
        
        db.ref(path).once('value', snap => {
            let data = snap.val();
            if(data.locked) return; // Sécurité supplémentaire si verrouillé
            
            // Si le champ est vide, on part de 0
            let current = (data[field] === '' || data[field] === undefined || data[field] === '-') ? 0 : parseInt(data[field]);
            
            // On empêche les scores négatifs
            let newVal = Math.max(0, current + delta);
            
            // On pousse sur Firebase
            db.ref(path).update({ 
                [field]: newVal,
                auth_token: accessKey 
            }).catch(err => alert("Erreur réseau : Le score n'a pas pu être mis à jour."));
        });
    }
</script>
</body>
</html>
