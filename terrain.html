<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T3N - Interface Terrain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans overflow-x-hidden select-none">

    <header class="bg-slate-900 border-b border-white/10 p-4 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 id="display-terrain" class="text-2xl font-black text-amber-500 uppercase italic leading-none">Terrain ...</h1>
            <p id="display-cat" class="text-[10px] font-bold opacity-50 uppercase tracking-widest mt-1">Chargement...</p>
        </div>
        <div id="connection-status" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]"></div>
    </header>

    <main id="app" class="p-4 space-y-6">
        <div class="flex flex-col items-center justify-center py-20 opacity-20 italic">
            Récupération des matchs sur Firebase...
        </div>
    </main>

    <script>
        // Extraction des paramètres URL
        const params = new URLSearchParams(window.location.search);
        const year = params.get('year') || '2026';
        const cat = params.get('cat') || 'U10';
        const terrain = params.get('terrain') || 'A';

        document.getElementById('display-terrain').innerText = `Terrain ${terrain}`;
        document.getElementById('display-cat').innerText = `${cat} • SAISON ${year}`;

        // Configuration Firebase (À compléter avec vos clés)
        const firebaseConfig = { /* Vos clés ici */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Listener des matchs pour ce terrain spécifique
        const matchRef = db.ref(`t3n/${year}/${cat}/matches`).orderByChild('terrain').equalTo(terrain);
        
        matchRef.on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('connection-status').classList.replace('bg-red-500', 'bg-green-500');
            document.getElementById('connection-status').style.boxShadow = "0 0 10px green";
            renderMatches(data);
        });

        function renderMatches(data) {
            const container = document.getElementById('app');
            if(!data) {
                container.innerHTML = "<p class='text-center opacity-50'>Aucun match programmé pour ce terrain.</p>";
                return;
            }

            const matches = Object.entries(data)
                .map(([id, val]) => ({ id, ...val }))
                .filter(m => m.status !== 'termine')
                .sort((a, b) => a.ordre - b.ordre);

            container.innerHTML = matches.map((m, idx) => `
                <div class="bg-slate-900 border border-white/10 rounded-[2.5rem] p-6 ${idx === 0 ? 'ring-2 ring-amber-500/50 shadow-2xl scale-100' : 'opacity-40 scale-95'} transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black uppercase">Match n°${m.ordre}</span>
                        <button onclick="setHold('${m.id}')" class="text-[10px] font-black uppercase text-amber-500 border border-amber-500/30 px-3 py-1 rounded-full">Attendre</button>
                    </div>

                    <div class="grid grid-cols-2 gap-4 items-center mb-8">
                        <div class="text-center space-y-4">
                            <h2 class="text-xl font-black uppercase leading-tight h-12 flex items-center justify-center">${m.t1}</h2>
                            <div class="flex flex-col items-center gap-2">
                                <button onclick="updateScore('${m.id}', 's1', 1)" class="bg-amber-500 text-slate-950 w-full py-8 rounded-3xl text-6xl font-black shadow-lg active:scale-95 transition-transform">+</button>
                                <button onclick="updateScore('${m.id}', 's1', -1)" class="text-white/20 font-bold p-2">-1</button>
                            </div>
                            <div class="text-7xl font-black italic tracking-tighter">${m.s1}</div>
                        </div>
                        
                        <div class="text-center space-y-4">
                            <h2 class="text-xl font-black uppercase leading-tight h-12 flex items-center justify-center">${m.t2}</h2>
                            <div class="flex flex-col items-center gap-2">
                                <button onclick="updateScore('${m.id}', 's2', 1)" class="bg-white text-slate-950 w-full py-8 rounded-3xl text-6xl font-black shadow-lg active:scale-95 transition-transform">+</button>
                                <button onclick="updateScore('${m.id}', 's2', -1)" class="text-white/20 font-bold p-2">-1</button>
                            </div>
                            <div class="text-7xl font-black italic tracking-tighter">${m.s2}</div>
                        </div>
                    </div>

                    <button onclick="finishMatch('${m.id}')" class="w-full bg-green-600 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl">Valider & Clôturer</button>
                </div>
            `).join('');
        }

        function updateScore(matchId, scoreKey, val) {
            const ref = db.ref(`t3n/${year}/${cat}/matches/${matchId}/${scoreKey}`);
            ref.transaction(current => Math.max(0, (current || 0) + val));
        }

        function setHold(matchId) {
            // Logique : on augmente l'index 'ordre' pour le mettre à la fin
            db.ref(`t3n/${year}/${cat}/matches/${matchId}`).update({ ordre: Date.now() });
        }

        function finishMatch(matchId) {
            if(confirm("Confirmer le score final ? Le match disparaîtra de votre liste.")) {
                db.ref(`t3n/${year}/${cat}/matches/${matchId}`).update({ status: 'termine' });
            }
        }
    </script>
</body>
</html>
